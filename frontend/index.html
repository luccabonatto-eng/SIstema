const ContractTypeName = { MONTHLY:'Mensal', QUARTERLY:'Trimestral', ANNUAL:'Anual', ON_DEMAND:'Avulso' };

const ContractsPage = ({ taxRegime='REAL' }) => {
  const [contracts, setContracts] = useState([]);
  const [customers, setCustomers] = useState([]);
  const [loading, setLoading]     = useState(true);
  const [q, setQ]                 = useState('');

  useEffect(() => { loadContracts(); }, []);

  const loadContracts = async () => {
    setLoading(true);
    const [cRes, custRes] = await Promise.all([api.getContracts(), api.getCustomers()]);
    if (cRes.success) setContracts(cRes.data?.data || cRes.data || []);
    if (custRes.success) setCustomers(custRes.data?.data || custRes.data || []);
    setLoading(false);
  };
  const [selected, setSelected]   = useState(null);
  const [newModal, setNewModal]   = useState(false);
  const [toast, setToast]         = useState(null);
  const [form, setForm]           = useState({ customer_id:'', type:'MONTHLY', value:'', start_date:'', end_date:'', sla_hours:'24' });

  const list = contracts.filter(c=>!q||c.number.toLowerCase().includes(q.toLowerCase())||(c.customers?.name||'').toLowerCase().includes(q.toLowerCase()));
  const totalActive = contracts.filter(c=>c.status==='ACTIVE').reduce((s,c)=>s+c.value,0);
  const expiring = contracts.filter(c=>c.status==='ACTIVE').length;

  const create = async () => {
    if (!form.customer_id) { setToast('Selecione um cliente'); return; }
    if (!form.value || isNaN(parseFloat(form.value)) || parseFloat(form.value) <= 0) { setToast('Informe um valor válido'); return; }
    if (!form.start_date||!form.end_date) { setToast('Datas de início e fim são obrigatórias'); return; }
    const result = await api.createContract({
      customer_id: form.customer_id,
      type: form.type,
      value: Math.round(parseFloat(form.value)*100),
      start_date: form.start_date,
      end_date: form.end_date,
      sla_hours: parseInt(form.sla_hours)||24,
      status: 'ACTIVE'
    });
    if (result.success) {
      setContracts(p=>[result.data,...p]);
      setNewModal(false);
      setForm({ customer_id:'', type:'MONTHLY', value:'', start_date:'', end_date:'', sla_hours:'24' });
      setToast(`Contrato ${result.data.number} criado com sucesso!`);
    } else {
      setToast(`Erro ao criar contrato: ${result.error}`);
    }
  };

  const suspend = async id => {
    const result = await api.updateContract(id, { status: 'SUSPENDED' });
    if (result.success) { setContracts(p=>p.map(c=>c.id===id?{...c,status:'SUSPENDED'}:c)); setSelected(null); setToast('Contrato suspenso.'); }
    else setToast(`Erro: ${result.error}`);
  };
  const activate = async id => {
    const result = await api.updateContract(id, { status: 'ACTIVE' });
    if (result.success) { setContracts(p=>p.map(c=>c.id===id?{...c,status:'ACTIVE'}:c)); setSelected(null); setToast('Contrato reativado!'); }
    else setToast(`Erro: ${result.error}`);
  };

  const sel = selected ? contracts.find(c=>c.id===selected.id)||selected : null;

  return (
    <div className="p-5 space-y-4">
      <div className="grid grid-cols-3 gap-4">
        <KPI title="Contratos Ativos" value={expiring} sub="na carteira" icon="contracts" color="blue"/>
        <KPI title="MRR Total" value={fmt(totalActive)} sub="Receita recorrente" icon="financial" color="green"/>
        <KPI title="Expirando em 30d" value="1 contrato" sub="CTR-2025-042" icon="audit" color="orange"/>
      </div>
      <div className="flex items-center gap-3">
        <div className="relative"><Icon name="search" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"/>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Nº ou cliente..."
            className="pl-9 pr-4 py-2 text-sm border border-gray-200 rounded-lg w-72 focus:outline-none focus:ring-2 focus:ring-blue-500"/></div>
        <button onClick={()=>setNewModal(true)} className="ml-auto flex items-center gap-1.5 bg-blue-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-blue-700">
          <Icon name="plus" className="w-4 h-4"/> Novo Contrato
        </button>
      </div>
      <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
        <table className="w-full text-sm">
          <thead className="bg-gray-50 border-b border-gray-200">
            <tr>{['Número','Cliente','Tipo','Valor/Ciclo','SLA','Vigência','Status',''].map(h=>(
              <th key={h} className="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">{h}</th>
            ))}</tr>
          </thead>
          <tbody className="divide-y divide-gray-100">
            {list.map(c=>(
              <tr key={c.id} className="hover:bg-gray-50 cursor-pointer" onClick={()=>setSelected(c)}>
                <td className="px-4 py-3 font-mono text-xs font-semibold text-gray-700">{c.number}</td>
                <td className="px-4 py-3 font-medium text-gray-800">{c.customers?.name||c.customer||'—'}</td>
                <td className="px-4 py-3 text-gray-600">{ContractTypeName[c.type]}</td>
                <td className="px-4 py-3 font-medium text-gray-800">{fmt(c.value)}</td>
                <td className="px-4 py-3 text-gray-600">{c.sla_hours||c.sla||'—'}h</td>
                <td className="px-4 py-3 text-xs text-gray-500">{fmtDate(c.start_date||c.start)} → {fmtDate(c.end_date||c.end)}</td>
                <td className="px-4 py-3"><Badge status={c.status}/></td>
                <td className="px-4 py-3"><button className="text-xs text-blue-600 hover:underline font-medium">Abrir →</button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Contract Detail Modal */}
      <Modal open={!!sel} onClose={()=>setSelected(null)} title={sel?.number||''} size="md">
        {sel&&(
          <div className="space-y-5">
            <Badge status={sel.status}/>
            <div className="grid grid-cols-2 gap-4">
              <LabelField label="Cliente"    value={sel.customers?.name||sel.customer||'—'}/>
              <LabelField label="Tipo"       value={ContractTypeName[sel.type]}/>
              <LabelField label="Valor/Ciclo" value={fmt(sel.value)}/>
              <LabelField label="SLA"        value={`${sel.sla_hours||sel.sla||'—'}h`}/>
              <LabelField label="Início"     value={fmtDate(sel.start_date||sel.start)}/>
              <LabelField label="Encerramento" value={fmtDate(sel.end_date||sel.end)}/>
            </div>
            {/* Painel fiscal do contrato */}
            {(()=>{ const tr=TAX_REGIMES[taxRegime]; const iss=tr.iss?Math.round(sel.value*tr.iss):null; return (
              <div className="bg-gray-50 rounded-xl p-4 border border-gray-100">
                <div className="flex items-center gap-2 mb-3">
                  <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Carga Tributária</p>
                  <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${tr.color}`}>{tr.label}</span>
                </div>
                <div className="grid grid-cols-2 gap-3 text-xs">
                  <div><p className="text-gray-400">Valor Bruto/Ciclo</p><p className="font-semibold text-gray-800 mt-0.5">{fmt(sel.value)}</p></div>
                  {iss&&<div><p className="text-gray-400">ISS ({(tr.iss*100).toFixed(0)}%)</p><p className="font-semibold text-red-600 mt-0.5">({fmt(iss)})</p></div>}
                  {tr.pis&&<div><p className="text-gray-400">PIS ({(tr.pis*100).toFixed(2)}%)</p><p className="font-semibold text-red-600 mt-0.5">({fmt(Math.round(sel.value*tr.pis))})</p></div>}
                  {tr.cofins&&<div><p className="text-gray-400">COFINS ({(tr.cofins*100).toFixed(2)}%)</p><p className="font-semibold text-red-600 mt-0.5">({fmt(Math.round(sel.value*tr.cofins))})</p></div>}
                  {tr.dasRate&&<div><p className="text-gray-400">DAS ({(tr.dasRate*100).toFixed(1)}%)</p><p className="font-semibold text-red-600 mt-0.5">({fmt(Math.round(sel.value*tr.dasRate))})</p></div>}
                  <div><p className="text-gray-400">Valor Líquido Est.</p><p className="font-bold text-green-700 mt-0.5">{fmt(sel.value - (iss||0) - (tr.pis?Math.round(sel.value*tr.pis):0) - (tr.cofins?Math.round(sel.value*tr.cofins):0) - (tr.dasRate?Math.round(sel.value*tr.dasRate):0))}</p></div>
                </div>
              </div>
            ); })()}
            <div className="flex gap-2 pt-2 border-t border-gray-100">
              {sel.status==='ACTIVE'&&<button onClick={()=>suspend(sel.id)} className="flex-1 py-2.5 border border-amber-300 text-amber-700 rounded-lg text-sm hover:bg-amber-50">Suspender</button>}
              {sel.status==='SUSPENDED'&&<button onClick={()=>activate(sel.id)} className="flex-1 py-2.5 bg-green-600 text-white rounded-lg text-sm font-medium hover:bg-green-700">Reativar</button>}
              <button onClick={async()=>{
                const addYear = d => d ? new Date(new Date(d).setFullYear(new Date(d).getFullYear()+1)).toISOString().split('T')[0] : null;
                const result = await api.createContract({
                  customer_id: sel.customer_id,
                  type: sel.type,
                  value: sel.value,
                  start_date: addYear(sel.start_date||sel.start),
                  end_date: addYear(sel.end_date||sel.end),
                  sla_hours: sel.sla_hours||sel.sla,
                  status: 'ACTIVE'
                });
                if (result.success) {
                  setContracts(p=>[result.data,...p]);
                  setSelected(null);
                  setToast(`Contrato renovado: ${result.data.number}`);
                } else {
                  setToast(result.error||'Erro ao renovar contrato');
                }
              }} className="flex-1 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">Renovar Contrato</button>
              <button onClick={()=>setSelected(null)} className="px-4 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-600 hover:bg-gray-50">Fechar</button>
            </div>
          </div>
        )}
      </Modal>

      {/* Novo Contrato Modal */}
      <Modal open={newModal} onClose={()=>setNewModal(false)} title="Novo Contrato" size="md">
        <div className="space-y-4">
          <div><label className="block text-sm font-medium text-gray-700 mb-1">Cliente *</label>
            <select value={form.customer_id} onChange={e=>setForm(p=>({...p,customer_id:e.target.value}))} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="">Selecione o cliente...</option>
              {customers.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select></div>
          {[
            {label:'Valor (R$) *',  key:'value',      placeholder:'0,00', type:'number'},
            {label:'SLA (horas)',   key:'sla_hours',  placeholder:'24',   type:'number'},
          ].map(f=>(
            <div key={f.key}><label className="block text-sm font-medium text-gray-700 mb-1">{f.label}</label>
              <input type={f.type||'text'} value={form[f.key]} onChange={e=>setForm(p=>({...p,[f.key]:e.target.value}))} placeholder={f.placeholder}
                className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/></div>
          ))}
          <div><label className="block text-sm font-medium text-gray-700 mb-1">Tipo</label>
            <select value={form.type} onChange={e=>setForm(p=>({...p,type:e.target.value}))} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none">
              <option value="MONTHLY">Mensal</option><option value="QUARTERLY">Trimestral</option><option value="ANNUAL">Anual</option><option value="ON_DEMAND">Avulso</option>
            </select></div>
          <div className="grid grid-cols-2 gap-3">
            <div><label className="block text-sm font-medium text-gray-700 mb-1">Início *</label>
              <input type="date" value={form.start_date} onChange={e=>setForm(p=>({...p,start_date:e.target.value}))} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none"/></div>
            <div><label className="block text-sm font-medium text-gray-700 mb-1">Encerramento *</label>
              <input type="date" value={form.end_date} onChange={e=>setForm(p=>({...p,end_date:e.target.value}))} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none"/></div>
          </div>
          <div className="flex gap-2 pt-2">
            <button onClick={()=>setNewModal(false)} className="flex-1 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-600 hover:bg-gray-50">Cancelar</button>
            <button onClick={create} className="flex-1 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">Criar Contrato</button>
          </div>
        </div>
      </Modal>

      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
};

          const RR=({l,c,p,base=recLiq,hl='green'})=>{
            const {l:vl,u}=vp(c,p); const pos=c>=0;
            const s={green:{bg:pos?'bg-green-50':'bg-red-50',tc:pos?'text-green-900':'text-red-800',vc:pos?'text-green-800':'text-red-700',vp2:pos?'text-green-700':'text-red-600'},blue:{bg:'bg-blue-50',tc:'text-blue-900',vc:'text-blue-800',vp2:'text-blue-600'},navy:{bg:'bg-blue-700',tc:'text-white',vc:'text-white',vp2:'text-blue-200'}};
            const C=s[hl]||s.green;
            return(<tr className={`border-t-2 border-gray-200 ${C.bg}`}>
              <td className={`px-4 py-3 text-sm font-bold ${C.tc}`}>{l}</td>
              <td className={`px-4 py-3 text-sm font-bold text-right ${C.vc}`}>{fv(c)}</td>
              <td className={`px-4 py-3 text-xs text-right font-medium ${C.vc}`}>{base>0?av(c,base):'—'}</td>
              <td className={`px-3 py-3 text-xs font-bold text-center ${vl==='—'?'text-gray-300':(u?'text-green-500':'text-red-400')}`}>{vl}</td>
              <td className={`px-4 py-3 text-sm font-semibold text-right ${C.vp2}`}>{fv(p)}</td>
            </tr>);
          };

          return (
            <div className="space-y-4">
              {/* KPI cards */}
              {hasData&&(
              <div className="grid grid-cols-5 gap-3">
                {[
                  {l:'Receita Líquida',c:recLiq, p:recLiqP, bg:'bg-blue-50',   bdr:'border-blue-200',   tc:'text-blue-700'},
                  {l:'Lucro Bruto',    c:lb,     p:lbP,     bg:'bg-green-50',  bdr:'border-green-200',  tc:'text-green-700',  mg:recLiq>0?av(lb,recLiq):'—'},
                  {l:'EBIT',          c:ebit,   p:ebitP,   bg:'bg-indigo-50', bdr:'border-indigo-200', tc:'text-indigo-700', mg:recLiq>0?av(ebit,recLiq):'—'},
                  {l:'EBITDA',        c:ebitda, p:ebitdaP, bg:'bg-teal-50',   bdr:'border-teal-200',   tc:'text-teal-700',   mg:recLiq>0?av(ebitda,recLiq):'—'},
                  {l:'Lucro Líquido', c:ll,     p:llP,     bg:'bg-emerald-50',bdr:'border-emerald-200',tc:'text-emerald-700',mg:recLiq>0?av(ll,recLiq):'—'},
                ].map((k,i)=>{const {l:vl,u}=vp(k.c,k.p); return(

                    <p className="text-xs text-gray-500 mb-1">{k.l}</p>
                    <p className={`text-base font-bold ${k.tc}`}>{fv(k.c)}</p>
                    {k.mg&&<p className="text-xs text-gray-400 mt-0.5">Margem: <span className={`font-semibold ${k.tc}`}>{k.mg}</span></p>}
                    <p className={`text-xs mt-1 font-medium ${vl==='—'?'text-gray-400':u?'text-green-600':'text-red-500'}`}>{vl} vs {prevLabel}</p>
                  </div>
                );})}
              </div>
              )}

              <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                <div className="px-5 py-3.5 border-b border-gray-100 flex flex-wrap gap-3 items-center bg-gray-50">
                  <div className="flex-1 min-w-0">
                    <h3 className="text-sm font-bold text-gray-800">DRE — Demonstração do Resultado do Exercício</h3>
                    <p className="text-xs text-gray-400 mt-0.5">{curLabel} × {prevLabel} · Regime de Competência · CPC 26 · Valores em R$</p>
                  </div>
                  <select value={drePeriod} onChange={e=>setDrePeriod(e.target.value)}
                    className="text-xs border border-gray-200 rounded-lg px-2.5 py-1.5 bg-white text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-400">
                    {monthOptions.map(m=><option key={m} value={m}>{monthLabel(m)}</option>)}
                  </select>
                </div>
                {!hasData?(
                  <div className="px-5 py-12 text-center">
                    <p className="text-4xl mb-3">📋</p>
                    <p className="text-sm font-medium text-gray-600">Nenhum lançamento em {curLabel}</p>
                    <p className="text-xs text-gray-400 mt-1">Adicione receitas e despesas usando as categorias classificadas para gerar a DRE</p>
                  </div>
                ):(
                <div className="overflow-x-auto">
                  <table className="w-full text-sm">
                    <thead><tr className="bg-gray-100 border-b-2 border-gray-300">
                      <th className="px-4 py-2.5 text-left text-xs font-semibold text-gray-600 uppercase tracking-wide">Descrição</th>
                      <th className="px-4 py-2.5 text-right text-xs font-semibold text-blue-700 uppercase tracking-wide whitespace-nowrap">{curLabel}</th>
                      <th className="px-4 py-2.5 text-right text-xs font-semibold text-gray-400 uppercase tracking-wide whitespace-nowrap">AV%</th>
                      <th className="px-3 py-2.5 text-center text-xs font-semibold text-gray-400 uppercase tracking-wide whitespace-nowrap">Var%</th>
                      <th className="px-4 py-2.5 text-right text-xs font-semibold text-gray-500 uppercase tracking-wide whitespace-nowrap">{prevLabel}</th>
                    </tr></thead>
                    <tbody>
                      {/* RECEITA BRUTA */}
                      <HR l="Receita Bruta de Serviços"/>
                      {itemsFor('INCOME','RECEITA_SERVICO','RECEITA_CONTRATO','OUTRAS_RECEITAS').map(({n,c,p})=><IR2 key={n} l={n} c={c} p={p}/>)}
                      {recBruta===0&&<tr className="border-t border-gray-100"><td colSpan="5" className="px-4 py-2 text-xs text-gray-400 pl-8">Nenhuma receita — adicione lançamentos com categorias de receita</td></tr>}
                      <STR l="(=) Receita Bruta Total" c={recBruta} p={recBrutaP} base={recBruta}/>

                      {/* DEDUÇÕES */}
                      {(ded>0||dedP>0)&&<><HR l="(-) Deduções da Receita Bruta (Impostos sobre Receita)"/>
                        {itemsFor('EXPENSE','IMPOSTO_RECEITA').map(({n,c,p})=><IR2 key={n} l={n} c={c} p={p} neg/>)}
                        <STR l="Total Deduções" c={ded} p={dedP} base={recBruta} neg/></>}

                      {/* RECEITA LÍQUIDA */}
                      <RR l="(=) RECEITA LÍQUIDA DE SERVIÇOS" c={recLiq} p={recLiqP} base={recLiq} hl="blue"/>

                      {/* CSP */}
                      {(csp>0||cspP>0)&&<><HR l="(-) Custo dos Serviços Prestados (CSP)"/>
                        {itemsFor('EXPENSE','CSP').map(({n,c,p})=><IR2 key={n} l={n} c={c} p={p} neg/>)}
                        <STR l="Total CSP" c={csp} p={cspP} neg/></>}

                      {/* LUCRO BRUTO */}
                      <RR l="(=) LUCRO BRUTO" c={lb} p={lbP} hl="green"/>

                      {/* DESPESAS OPERACIONAIS */}
                      {(totOp>0||totOpP>0)&&<><HR l="(-) Despesas Operacionais"/>
                        {(dPes>0||dPesP>0)&&<><SubHR l="Despesas com Pessoal"/>
                          {itemsFor('EXPENSE','DESPESA_PESSOAL').map(({n,c,p})=><IR2 key={n} l={n} c={c} p={p} ind={2} neg/>)}
                          <STR l="Subtotal Pessoal" c={dPes} p={dPesP} neg/></>}
                        {(dAdm>0||dAdmP>0)&&<><SubHR l="Despesas Gerais e Administrativas (G&A)"/>
                          {itemsFor('EXPENSE','DESPESA_ADMINISTRATIVA').map(({n,c,p})=><IR2 key={n} l={n} c={c} p={p} ind={2} neg/>)}
                          <STR l="Subtotal G&A" c={dAdm} p={dAdmP} neg/></>}
                        {(dCom>0||dComP>0)&&<><SubHR l="Despesas Comerciais"/>
                          {itemsFor('EXPENSE','DESPESA_COMERCIAL').map(({n,c,p})=><IR2 key={n} l={n} c={c} p={p} ind={2} neg/>)}
                          <STR l="Subtotal Comercial" c={dCom} p={dComP} neg/></>}
                        <STR l="(=) Total Despesas Operacionais" c={totOp} p={totOpP} neg/></>}

                      {/* EBIT */}
                      <RR l="(=) EBIT — Resultado Operacional" c={ebit} p={ebitP} hl="green"/>

                      {/* EBITDA */}
                      {(da>0||daP>0)&&<><HR l="EBITDA — Ajuste D&A"/>
                        {itemsFor('EXPENSE','DEPRECIACAO').map(({n,c,p})=><IR2 key={n} l={`(+) D&A add-back — ${n}`} c={c} p={p}/>)}
                        <RR l="(=) EBITDA" c={ebitda} p={ebitdaP} hl="blue"/></>}

                      {/* RESULTADO FINANCEIRO */}
                      {(rFin>0||dFin>0||rFinP>0||dFinP>0)&&<><HR l="(+/-) Resultado Financeiro"/>
                        {(rFin>0||rFinP>0)&&<IR2 l="(+) Receitas Financeiras (CDB/Aplicações)" c={rFin} p={rFinP}/>}
                        {itemsFor('EXPENSE','DESPESA_FINANCEIRA').map(({n,c,p})=><IR2 key={n} l={n} c={c} p={p} neg/>)}
                        <STR l="Resultado Financeiro Líquido" c={resFinLiq} p={resFinLiqP} neg={resFinLiq<0}/></>}

                      {/* LAIR */}
                      <RR l="(=) LAIR — Lucro Antes do IR e CSLL" c={lair} p={lairP} hl="green"/>

                      {/* IR / CSLL */}
                      {(ir>0||irP>0)&&<><HR l="(-) Impostos sobre o Lucro (IR e CSLL)"/>
                        {itemsFor('EXPENSE','IMPOSTO_RENDA').map(({n,c,p})=><IR2 key={n} l={n} c={c} p={p} neg/>)}
                        <STR l="Total IR e CSLL" c={ir} p={irP} neg/></>}

                      {/* LUCRO LÍQUIDO */}
                      <tr className={`border-t-2 ${ll>=0?'bg-blue-700':'bg-red-700'}`}>
                        <td className="px-4 py-3.5 text-sm font-bold text-white">(=) LUCRO LÍQUIDO DO EXERCÍCIO</td>
                        <td className="px-4 py-3.5 text-sm font-bold text-white text-right">{fv(ll)}</td>
                        <td className={`px-4 py-3.5 text-xs text-right ${ll>=0?'text-blue-200':'text-red-200'}`}>{recLiq>0?av(ll,recLiq):'—'}</td>
                        <td className={`px-3 py-3.5 text-xs font-bold text-center ${vp(ll,llP).u?'text-green-300':'text-red-300'}`}>{vp(ll,llP).l}</td>
                        <td className={`px-4 py-3.5 text-sm font-semibold text-right ${ll>=0?'text-blue-200':'text-red-200'}`}>{fv(llP)}</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
                )}
              </div>
            </div>
          );
        })()}

        {tab==='payroll'&&(()=>{
          const PAYROLL_MONTHS=[['2026-04','Abril 2026'],['2026-03','Março 2026'],['2026-02','Fevereiro 2026'],['2026-01','Janeiro 2026']];
          // helpers de cálculo
          const bruto  = r => r.base + r.horasExtras + r.adicNoturno + r.periculosidade + r.insalubridade + r.bonus;
          const deducEmp = r => r.dINSS + r.dIRRF + r.dVT + r.dPlano;
          const liquido  = r => bruto(r) - deducEmp(r);       // valor líquido depositado em conta
          const benefEmp = r => r.vt + r.vr + r.planoSaude;   // benefícios custeados pela empresa
          const encargos = r => r.inssPatronal + r.fgts + r.rat + r.sistemaS;
          const provisoes= r => r.prov13 + r.provFerias + r.fgtsProv;
          const custoTotal= r => bruto(r) + benefEmp(r) + encargos(r) + provisoes(r);

          const rows = payroll.filter(p=>p.ref===payrollRef);
          const totLiq   = rows.reduce((s,r)=>s+liquido(r),0);
          const totCusto = rows.reduce((s,r)=>s+custoTotal(r),0);
          const totBruto = rows.reduce((s,r)=>s+bruto(r),0);
          const totEnc   = rows.reduce((s,r)=>s+encargos(r)+provisoes(r),0);

          const payAll = () => { setPayroll(prev=>prev.map(p=>p.ref===payrollRef?{...p,status:'PAID'}:p)); setToast('Folha aprovada e paga!'); };

          const emp = payEmpModal;
          return (
            <div className="space-y-4">
              {/* Header */}
              <div className="flex items-center justify-between flex-wrap gap-3">
                <div>
                  <h2 className="text-base font-bold text-gray-800">Folha Salarial</h2>
                  <p className="text-xs text-gray-400 mt-0.5">{rows.length} colaborador(es) · {PAYROLL_MONTHS.find(([k])=>k===payrollRef)?.[1]}</p>
                </div>
                <div className="flex gap-2 flex-wrap items-center">
                  <select value={payrollRef} onChange={e=>setPayrollRef(e.target.value)} className="text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
                    {PAYROLL_MONTHS.map(([k,l])=><option key={k} value={k}>{l}</option>)}
                  </select>
                  <button onClick={()=>setNewPayModal(true)} className="flex items-center gap-1.5 text-sm border border-gray-200 text-gray-600 px-3 py-2 rounded-lg hover:bg-gray-50"><Icon name="plus" className="w-4 h-4"/> Funcionário</button>
                  {rows.some(r=>r.status==='PENDING')&&
                    <button onClick={payAll} className="text-sm bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 font-semibold">✓ Aprovar e Pagar Folha</button>}
                </div>
              </div>

              {/* KPIs */}
              <div className="grid grid-cols-4 gap-4">
                <div className="bg-cyan-50 border border-cyan-100 rounded-xl p-4">
                  <p className="text-xs font-medium text-cyan-600 uppercase tracking-wide">Total Bruto</p>
                  <p className="text-2xl font-bold text-cyan-700 mt-1">{fmt(totBruto)}</p>
                  <p className="text-xs text-cyan-500 mt-0.5">salários + extras + adicionais + bônus</p>
                </div>
                <div className="bg-blue-50 border border-blue-100 rounded-xl p-4">
                  <p className="text-xs font-medium text-blue-600 uppercase tracking-wide">Total Líquido a Pagar</p>
                  <p className="text-2xl font-bold text-blue-700 mt-1">{fmt(totLiq)}</p>
                  <p className="text-xs text-blue-500 mt-0.5">bruto − INSS − IRRF − descontos</p>
                </div>
                <div className="bg-red-50 border border-red-100 rounded-xl p-4">
                  <p className="text-xs font-medium text-red-600 uppercase tracking-wide">Encargos + Provisões</p>
                  <p className="text-2xl font-bold text-red-700 mt-1">{fmt(totEnc)}</p>
                  <p className="text-xs text-red-500 mt-0.5">INSS patronal + FGTS + RAT + Sistema S + provisões</p>
                </div>
                <div className="bg-orange-50 border border-orange-100 rounded-xl p-4">
                  <p className="text-xs font-medium text-orange-600 uppercase tracking-wide">Custo Total Empresa</p>
                  <p className="text-2xl font-bold text-orange-700 mt-1">{fmt(totCusto)}</p>
                  <p className="text-xs text-orange-500 mt-0.5">tudo incluído · {totBruto>0?((totCusto/totBruto)*100).toFixed(0):'—'}% do bruto</p>
                </div>
              </div>

              {/* Tabela de funcionários */}
              <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                <table className="w-full text-sm">
                  <thead className="bg-gray-50 border-b border-gray-200">
                    <tr>
                      {['Funcionário','Cargo','Salário Bruto','Deduções Emp.','Líquido a Pagar','Benefícios','Encargos+Prov.','Custo Total','Status',''].map(h=>(
                        <th key={h} className="px-3 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide whitespace-nowrap">{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-100">
                    {rows.length===0&&<tr><td colSpan="10" className="px-4 py-8 text-center text-sm text-gray-400">Nenhum funcionário para o período selecionado</td></tr>}
                    {rows.map(r=>(
                      <tr key={r.id} className={`hover:bg-gray-50 cursor-pointer ${r.status==='PAID'?'bg-green-50/20':''}`} onClick={()=>setPayEmpModal(r)}>
                        <td className="px-3 py-3">
                          <p className="font-semibold text-gray-800">{r.name}</p>
                          <p className="text-xs text-gray-400">{r.cpf}</p>
                        </td>
                        <td className="px-3 py-3 text-xs text-gray-500 whitespace-nowrap">{r.role}</td>
                        <td className="px-3 py-3 font-medium text-gray-800">{fmt(bruto(r))}</td>
                        <td className="px-3 py-3 text-red-500 font-medium">-{fmt(deducEmp(r))}</td>
                        <td className="px-3 py-3 font-bold text-blue-700">{fmt(liquido(r))}</td>
                        <td className="px-3 py-3 text-gray-600">{fmt(benefEmp(r))}</td>
                        <td className="px-3 py-3 text-red-400">{fmt(encargos(r)+provisoes(r))}</td>
                        <td className="px-3 py-3 font-bold text-orange-700">{fmt(custoTotal(r))}</td>
                        <td className="px-3 py-3">
                          <span className={`text-xs font-medium px-2 py-0.5 rounded-full whitespace-nowrap ${r.status==='PAID'?'bg-green-100 text-green-700':'bg-amber-100 text-amber-700'}`}>
                            {r.status==='PAID'?'✓ Pago':'Pendente'}
                          </span>
                        </td>
                        <td className="px-3 py-3">
                          <button className="text-xs text-blue-600 hover:underline whitespace-nowrap" onClick={e=>{e.stopPropagation();setPayEmpModal(r);}}>Ver detalhes →</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                  <tfoot className="bg-gray-100 border-t-2 border-gray-300">
                    <tr>
                      <td colSpan="2" className="px-3 py-3 text-xs font-bold text-gray-600 uppercase">Totais do Período</td>
                      <td className="px-3 py-3 text-xs font-bold text-gray-800">{fmt(totBruto)}</td>
                      <td className="px-3 py-3 text-xs font-bold text-red-600">{fmt(rows.reduce((s,r)=>s+deducEmp(r),0))}</td>
                      <td className="px-3 py-3 text-xs font-bold text-blue-700">{fmt(totLiq)}</td>
                      <td className="px-3 py-3 text-xs font-bold text-gray-600">{fmt(rows.reduce((s,r)=>s+benefEmp(r),0))}</td>
                      <td className="px-3 py-3 text-xs font-bold text-red-500">{fmt(totEnc)}</td>
                      <td className="px-3 py-3 text-xs font-bold text-orange-700">{fmt(totCusto)}</td>
                      <td colSpan="2"/>
                    </tr>
                  </tfoot>
                </table>
              </div>

              {/* Modal detalhe do funcionário */}
              <Modal open={!!emp} onClose={()=>setPayEmpModal(null)} title={emp?`${emp.name} — Holerite Detalhado`:'Holerite'} size="lg">
                {emp&&(()=>{
                  const Linha=({l,v,cls='text-gray-700',bold=false,indent=false,sep=false})=>(
                    <div className={`flex justify-between items-center py-1.5 ${sep?'border-t border-gray-200 mt-1':'border-b border-gray-100'} ${indent?'pl-4':''}`}>
                      <span className={`text-xs ${bold?'font-bold text-gray-800':'text-gray-500'}`}>{l}</span>
                      <span className={`text-xs font-semibold ${cls} ${bold?'text-sm':''}`}>{v}</span>
                    </div>
                  );
                  const b=bruto(emp), ded=deducEmp(emp), liq=liquido(emp), bef=benefEmp(emp), enc=encargos(emp), prov=provisoes(emp), ct=custoTotal(emp);
                  return (
                    <div className="space-y-4">
                      <div className="flex items-center gap-4 pb-3 border-b border-gray-100">
                        <div className="w-12 h-12 rounded-full bg-cyan-600 flex items-center justify-center text-white text-lg font-bold">{(emp.name||'?')[0]}</div>
                        <div>
                          <p className="font-bold text-gray-800">{emp.name}</p>
                          <p className="text-xs text-gray-400">{emp.role} · CPF {emp.cpf} · Admissão: {fmtDate(emp.admDate)}</p>
                        </div>
                        <div className="ml-auto flex gap-2 flex-wrap">
                          <span className={`text-xs font-semibold px-3 py-1 rounded-full ${emp.status==='PAID'?'bg-green-100 text-green-700':'bg-amber-100 text-amber-700'}`}>
                            {emp.status==='PAID'?'✓ Pago':'Pendente'}
                          </span>
                          <button onClick={()=>openEditPay(emp)}
                            className="text-xs border border-gray-200 text-gray-600 px-3 py-1 rounded-full hover:bg-gray-50 font-medium">✏ Editar</button>
                          {emp.status==='PENDING'&&
                            <button onClick={()=>{setPayroll(prev=>prev.map(p=>p.id===emp.id?{...p,status:'PAID'}:p));setPayEmpModal(prev=>prev?{...prev,status:'PAID'}:null);setToast(`Pagamento de ${emp.name} confirmado!`);}}
                              className="text-xs bg-green-600 text-white px-3 py-1 rounded-full hover:bg-green-700 font-semibold">Confirmar Pagamento</button>}
                        </div>
                      </div>

                      <div className="grid grid-cols-2 gap-4">
                        {/* Coluna 1: O que o funcionário RECEBE */}
                        <div className="bg-blue-50 rounded-xl p-4">
                          <p className="text-xs font-bold text-blue-700 uppercase tracking-wide mb-3">Proventos e Deduções</p>
                          <p className="text-xs font-semibold text-gray-500 uppercase mb-1">Remuneração</p>
                          <Linha l="Salário Base"                v={fmt(emp.base)}/>
                          {emp.horasExtras>0&&<Linha l="Horas Extras"   v={fmt(emp.horasExtras)}   cls="text-green-600" indent/>}
                          {emp.adicNoturno>0&&<Linha l="Adicional Noturno" v={fmt(emp.adicNoturno)} cls="text-green-600" indent/>}
                          {emp.periculosidade>0&&<Linha l="Periculosidade (30%)" v={fmt(emp.periculosidade)} cls="text-green-600" indent/>}
                          {emp.insalubridade>0&&<Linha l="Insalubridade"  v={fmt(emp.insalubridade)} cls="text-green-600" indent/>}
                          {emp.bonus>0&&<Linha l="Bônus / Comissão"         v={fmt(emp.bonus)}       cls="text-green-600" indent/>}
                          <Linha l="(=) Total Bruto" v={fmt(b)} bold cls="text-gray-800" sep/>

                          <p className="text-xs font-semibold text-gray-500 uppercase mt-3 mb-1">Deduções do Empregado</p>
                          <Linha l="(-) INSS Empregado"           v={'-'+fmt(emp.dINSS)}    cls="text-red-500"/>
                          <Linha l="(-) IRRF"                     v={emp.dIRRF>0?'-'+fmt(emp.dIRRF):'Isento'}  cls={emp.dIRRF>0?'text-red-500':'text-gray-400'}/>
                          {emp.dVT>0&&<Linha l="(-) Desconto Vale Transporte" v={'-'+fmt(emp.dVT)}    cls="text-red-400"/>}
                          {emp.dPlano>0&&<Linha l="(-) Desconto Plano Saúde"  v={'-'+fmt(emp.dPlano)} cls="text-red-400"/>}
                          <Linha l="(=) LÍQUIDO A RECEBER" v={fmt(liq)} bold cls="text-blue-700" sep/>

                  </div>

                  {/* Impacto no DRE */}
                  <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-4">
                    <h3 className="text-sm font-bold text-gray-800 mb-3">Impacto no DRE</h3>
                    {approvalSel.size===0
                      ? <p className="text-xs text-gray-400 text-center py-2">Selecione lançamentos para simular</p>
                      : <div className="space-y-0 text-xs">
                          <div className="flex justify-between py-2 border-b border-gray-100">
                            <span className="text-gray-500">Despesas pagas (atual)</span>
                            <span className="font-medium text-gray-700">{fmt(expPaid)}</span>
                          </div>
                          <div className="flex justify-between py-2 border-b border-gray-100">
                            <span className="text-gray-500">(+) Aprovações selecionadas</span>
                            <span className="font-semibold text-red-500">{selExp>0?'+'+fmt(selExp):'—'}</span>
                          </div>
                          <div className="flex justify-between py-2 border-b-2 border-violet-200">
                            <span className="font-semibold text-gray-700">Despesas pagas (simulado)</span>
                            <span className="font-bold text-red-700">{fmt(expPaid+selExp)}</span>
                          </div>
                          <div className="flex justify-between py-2 border-b border-gray-100">
                            <span className="text-gray-500">Impacto no resultado</span>
                            <span className={`font-semibold ${selExp>0?'text-red-600':'text-gray-400'}`}>{selExp>0?'−'+fmt(selExp):'—'}</span>
                          </div>
                          <div className="flex justify-between py-2">
                            <span className="text-gray-500">% sobre total de despesas</span>
                            <span className="font-medium text-gray-600">{dreImpactPct}%</span>
                          </div>
                        </div>}
                  </div>

                  {/* Impacto no Fluxo de Caixa — hoje */}
                  <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-4">
                    <h3 className="text-sm font-bold text-gray-800 mb-3">Fluxo de Caixa — Hoje (05/04)</h3>
                    <table className="w-full text-xs">
                      <thead>
                        <tr className="border-b border-gray-200">
                          <th className="py-1.5 text-left text-gray-400 font-medium"></th>
                          <th className="py-1.5 text-right text-gray-400 font-medium">Sem aprovação</th>
                          <th className="py-1.5 text-right text-violet-600 font-bold">Com aprovação</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-gray-100">
                        <tr>
                          <td className="py-2 text-gray-500">Entradas</td>
                          <td className="py-2 text-right text-green-600 font-medium">{cfTodayIns>0?fmt(cfTodayIns):'—'}</td>
                          <td className="py-2 text-right font-bold text-green-700">{selInc>0?fmt(selInc):cfTodayIns>0?fmt(cfTodayIns):'—'}</td>
                        </tr>
                        <tr>
                          <td className="py-2 text-gray-500">Saídas</td>
                          <td className="py-2 text-right text-red-500 font-medium">{cfTodayOuts>0?fmt(cfTodayOuts):'—'}</td>
                          <td className="py-2 text-right font-bold text-red-700">{selExp>0?fmt(selExp):'—'}</td>
                        </tr>
                        <tr className="border-t-2 border-gray-200">
                          <td className="py-2 font-semibold text-gray-700">Resultado do dia</td>
                          <td className={`py-2 text-right font-semibold ${(cfTodayIns-cfTodayOuts)>=0?'text-green-600':'text-red-600'}`}>{fmt(cfTodayIns-cfTodayOuts)}</td>
                          <td className={`py-2 text-right font-bold ${(selInc-selExp)>=0?'text-green-700':'text-red-700'}`}>{fmt(selInc-selExp)}</td>
                        </tr>
                        <tr>
                          <td className="py-2 font-semibold text-gray-700">Saldo final</td>
                          <td className="py-2 text-right font-semibold text-gray-600">{fmt(saldoAtual+cfTodayIns-cfTodayOuts)}</td>
                          <td className={`py-2 text-right font-bold ${saldoPos>=saldoAtual?'text-green-700':saldoPos>=10000000?'text-blue-700':'text-red-700'}`}>{fmt(saldoPos)}</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          );
        })()}

        <Modal open={!!importModal} onClose={()=>{setImportModal(null);setImportText('');}} title={importModal==='INCOME'?'Importar Recebimentos':'Importar Despesas'} size="md">
          <div className="space-y-4">
            <div className="bg-blue-50 border border-blue-100 rounded-lg p-3 text-xs text-blue-700">
              <p className="font-semibold mb-1">Formato esperado (CSV, separado por ; ou tab):</p>
              <p className="font-mono">Descrição; Valor; Vencimento (AAAA-MM-DD); Categoria</p>
              <p className="mt-1 text-blue-500">Exemplo: Fatura Cliente X; 1500.00; 2026-05-10; Receita de OS</p>
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">Cole os dados da planilha aqui:</label>
              <textarea value={importText} onChange={e=>setImportText(e.target.value)} rows={8}
                placeholder={"Fatura ABC; 2500.00; 2026-05-15; Receita de Contratos\nFatura XYZ; 800.00; 2026-05-20; Receita de OS"}
                className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500"/>
            </div>
            <p className="text-xs text-gray-400">{importText.trim().split('\n').filter(l=>l.trim()).length} linha(s) detectada(s)</p>
            <div className="flex gap-2">
              <button onClick={()=>{setImportModal(null);setImportText('');}} className="flex-1 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-600 hover:bg-gray-50">Cancelar</button>
              <button onClick={parseImport} className="flex-1 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">Importar {importText.trim().split('\n').filter(l=>l.trim()).length} lançamentos</button>
            </div>
          </div>
        </Modal>
        {/* New Transaction Modal */}
        <Modal open={newTxModal} onClose={()=>setNewTxModal(false)} title={newTx.type==='INCOME'?'Novo Recebimento':'Nova Despesa'} size="md">
          <div className="space-y-4">
            <div className="flex gap-2">
              {[['INCOME','↑ Recebimento'],['EXPENSE','↓ Despesa']].map(([v,l])=>(
                <button key={v} onClick={()=>setNewTx(p=>({...p,type:v,category_id:''}))} className={`flex-1 py-2 rounded-lg text-sm font-medium border transition-colors ${newTx.type===v?(v==='INCOME'?'bg-green-600 text-white border-green-600':'bg-red-600 text-white border-red-600'):'border-gray-200 text-gray-600 hover:bg-gray-50'}`}>{l}</button>
              ))}
            </div>
            {[{label:'Descrição *',key:'description',type:'text',placeholder:'Ex: Fatura Hospital Regional'},{label:'Valor (R$) *',key:'amount',type:'number',placeholder:'0,00'},{label:'Vencimento *',key:'due_date',type:'date',placeholder:''}].map(f=>(
              <div key={f.key}><label className="block text-sm font-medium text-gray-700 mb-1">{f.label}</label>
                <input type={f.type} value={newTx[f.key]} onChange={e=>setNewTx(p=>({...p,[f.key]:e.target.value}))} placeholder={f.placeholder}
                  className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/></div>
            ))}
            <div><label className="block text-sm font-medium text-gray-700 mb-1">Categoria</label>
              <select value={newTx.category_id} onChange={e=>setNewTx(p=>({...p,category_id:e.target.value}))} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">Sem categoria</option>
                {(newTx.type==='INCOME'?incomeCats:expenseCats).map(c=><option key={c.id||c} value={c.id||c}>{c.name||c}</option>)}
              </select></div>
            <div className="grid grid-cols-2 gap-3">
              <div><label className="block text-sm font-medium text-gray-700 mb-1">Conta Bancária</label>
                <select value={newTx.bank_account_id} onChange={e=>setNewTx(p=>({...p,bank_account_id:e.target.value}))} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                  <option value="">Selecionar...</option>
                  {bankAccounts.map(b=><option key={b.id} value={b.id}>{b.name||b.bank_name||b.bank} — {b.account_number||b.account||''}</option>)}
                </select></div>
              <div><label className="block text-sm font-medium text-gray-700 mb-1">Forma de Pagamento</label>
                <select value={newTx.payment_method_id} onChange={e=>setNewTx(p=>({...p,payment_method_id:e.target.value}))} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                  <option value="">Selecionar...</option>
                  {payMethods.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
                </select></div>
            </div>
            <div className="flex gap-2 pt-2">
              <button onClick={()=>setNewTxModal(false)} className="flex-1 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-600 hover:bg-gray-50">Cancelar</button>
              <button onClick={addTx} className="flex-1 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">Salvar Lançamento</button>
            </div>
          </div>
        </Modal>
        {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
      </div>
    </div>
  );
};

// ─── INVENTORY ────────────────────────────────────────────────────────────────

const InventoryPage = () => {
  const [q, setQ]               = useState('');
  const [belowMin, setBelowMin] = useState(false);
  const [inventory, setInventory] = useState([]);
  const [selected, setSelected] = useState(null);
  const [newModal, setNewModal] = useState(false);
  const [adjustModal, setAdjustModal] = useState(null);
  const [adjustQty, setAdjustQty] = useState('');
  const [adjustDir, setAdjustDir] = useState('+');
  const [adjustNote, setAdjustNote] = useState('');
  const [toast, setToast] = useState(null);
  const [form, setForm] = useState({ sku:'', name:'', cat:'Equipamentos', qty:'', min:'', cost:'', loc:'' });
  const [invTab, setInvTab] = useState('items');
  const [products, setProducts] = useState([]);
  const [prodForm, setProdForm] = useState({code:'',name:'',cat:'Equipamentos',unit:'un',costRef:'',desc:''});
  const [newProdModal, setNewProdModal] = useState(false);

  const normalizeProduct = p => ({
    ...p,
    cat: p.category || p.cat || 'Outros',
    qty: p.quantity ?? p.qty ?? 0,
    min: p.min_quantity ?? p.min ?? 0,
    cost: p.unit_cost !== undefined ? Math.round(p.unit_cost * 100) : (p.cost || 0),
    loc: p.description || p.loc || '',
    belowMin: (p.quantity ?? p.qty ?? 0) < (p.min_quantity ?? p.min ?? 1),
    code: p.sku || p.code || '',
    unit: p.unit || 'un',
    costRef: p.unit_cost !== undefined ? Math.round(p.unit_cost * 100) : (p.costRef || 0),
    desc: p.description || p.desc || ''
  });

  useEffect(() => {
    api.getProducts().then(r => {
      if (r.success) {
        const normalized = (r.data?.data || r.data || []).map(normalizeProduct);
        setInventory(normalized);
        setProducts(normalized);
      }
    });
  }, []);

  const items = inventory.filter(i=>(!q||i.name.toLowerCase().includes(q.toLowerCase())||i.sku.toLowerCase().includes(q.toLowerCase()))&&(!belowMin||i.belowMin));

  const createItem = async () => {
    if (!form.name || !form.sku) { setToast('Nome e SKU são obrigatórios'); return; }
    const result = await api.createProduct({
      sku: form.sku, name: form.name, category: form.cat,
      quantity: parseInt(form.qty) || 0,
      unit_cost: parseFloat(form.cost || 0),
      description: form.loc
    });
    if (result.success) {
      const normalized = normalizeProduct(result.data);
      setInventory(p => [normalized, ...p]);
      setProducts(p => [normalized, ...p]);
      setNewModal(false);
      setForm({ sku:'', name:'', cat:'Equipamentos', qty:'', min:'', cost:'', loc:'' });
      setToast(`Item ${form.name} cadastrado!`);
    } else {
      setToast(result.error || 'Erro ao cadastrar item');
    }
  };


  const doAdjust = async () => {
    const target = adjustModal || selected;
    if (!target) return;
    const qty = parseInt(adjustQty) || 0;
    const curQty = inventory.find(i => i.id === target.id)?.qty ?? target.qty ?? 0;
    const newQty = adjustDir === '+' ? (curQty + qty) : Math.max(0, curQty - qty);
    const result = await api.updateProduct(target.id, { quantity: newQty });
    if (result.success) {
      const updater = i => i.id !== target.id ? i : { ...i, qty: newQty, quantity: newQty, belowMin: newQty < i.min };
      setInventory(p => p.map(updater));
      setToast(`Estoque de ${target.name} ajustado!`);
    } else {
      setToast(result.error || 'Erro ao ajustar estoque');
    }
    setAdjustModal(null); setAdjustQty(''); setAdjustDir('+'); setAdjustNote('');
  };

  return (
    <div className="p-5 space-y-4">
      <div className="flex gap-1 border-b border-gray-200">
        <button onClick={()=>setInvTab('items')} className={`px-5 py-2.5 text-sm font-medium border-b-2 -mb-px transition-colors ${invTab==='items'?'border-blue-600 text-blue-600':'border-transparent text-gray-500 hover:text-gray-700'}`}>Itens de Estoque</button>
        <button onClick={()=>setInvTab('products')} className={`px-5 py-2.5 text-sm font-medium border-b-2 -mb-px transition-colors ${invTab==='products'?'border-blue-600 text-blue-600':'border-transparent text-gray-500 hover:text-gray-700'}`}>Catálogo de Produtos</button>
      </div>

      {invTab==='items'&&(
      <div className="space-y-4">
      <div className="flex items-center gap-3">
        <div className="relative"><Icon name="search" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"/>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar..." className="pl-9 pr-4 py-2 text-sm border border-gray-200 rounded-lg w-64 focus:outline-none focus:ring-2 focus:ring-blue-500"/></div>
        <label className="flex items-center gap-2 text-sm text-gray-600 cursor-pointer"><input type="checkbox" checked={belowMin} onChange={e=>setBelowMin(e.target.checked)} className="rounded"/>Apenas abaixo do mínimo</label>
        <button onClick={()=>setNewModal(true)} className="ml-auto flex items-center gap-1.5 bg-blue-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-blue-700"><Icon name="plus" className="w-4 h-4"/> Novo Item</button>
      </div>

      <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
          <table className="w-full text-sm">
            <thead className="bg-gray-50 border-b border-gray-200"><tr>{['SKU','Nome','Categ.','Qtd / Mín','Custo Unit.','Valor Total','Localização','Status',''].map(h=><th key={h} className="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">{h}</th>)}</tr></thead>
            <tbody className="divide-y divide-gray-100">
              {items.map(i=>(
                <tr key={i.id} className={`hover:bg-gray-50 cursor-pointer ${i.belowMin?'bg-red-50':''}`} onClick={()=>setSelected(i)}>
                  <td className="px-4 py-3 font-mono text-xs text-gray-600">{i.sku}</td>
                  <td className="px-4 py-3 font-medium text-gray-800">{i.name}</td>
                  <td className="px-4 py-3 text-xs text-gray-500">{i.cat}</td>
                  <td className="px-4 py-3">
                    <div className="flex items-center gap-1.5"><span className={`font-bold ${i.belowMin?'text-red-600':'text-gray-800'}`}>{i.qty}</span><span className="text-xs text-gray-400">/ {i.min}</span></div>
                    <div className="w-16 bg-gray-100 rounded-full h-1 mt-1"><div className={`h-1 rounded-full ${i.belowMin?'bg-red-500':'bg-green-500'}`} style={{width:`${Math.min(100,(i.qty/i.min)*100)}%`}}/></div>
                  </td>
                  <td className="px-4 py-3 text-gray-700">{fmt(i.cost)}</td>
                  <td className="px-4 py-3 font-medium text-gray-800">{fmt(i.cost*i.qty)}</td>
                  <td className="px-4 py-3 text-xs text-gray-500 max-w-xs truncate">{i.loc}</td>
                  <td className="px-4 py-3">{i.belowMin?<span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs bg-red-100 text-red-700 font-medium">⚠ Crítico</span>:<span className="inline-flex items-center px-2 py-0.5 rounded-full text-xs bg-green-100 text-green-700 font-medium">Normal</span>}</td>
                  <td className="px-4 py-3"><button className="text-xs text-blue-600 hover:underline font-medium">Ajustar</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

      {/* Item Detail / Adjust Modal */}
      <Modal open={!!selected} onClose={()=>setSelected(null)} title={selected?.name||''} size="md">
        {selected&&(
          <div className="space-y-5">
            <div className="grid grid-cols-2 gap-4">
              <LabelField label="SKU"         value={selected.sku}/>
              <LabelField label="Categoria"   value={selected.cat}/>
              <LabelField label="Custo Unit." value={fmt(selected.cost)}/>
              <LabelField label="Localização" value={selected.loc}/>
              <div>
                <p className="text-xs text-gray-400 mb-0.5">Quantidade Atual</p>
                <p className={`text-2xl font-bold ${selected.belowMin?'text-red-600':'text-gray-800'}`}>{inventory.find(i=>i.id===selected.id)?.qty??selected.qty}</p>
                <p className="text-xs text-gray-400">Mínimo: {selected.min}</p>
              </div>
              <LabelField label="Valor Total" value={fmt(selected.cost*(inventory.find(i=>i.id===selected.id)?.qty??selected.qty))}/>
            </div>
            <div className="border-t border-gray-100 pt-4">
              <p className="text-sm font-semibold text-gray-700 mb-3">Ajustar Estoque</p>
              <div className="flex gap-2 mb-3">
                {[['+','Entrada / Compra'],['-','Saída / Uso']].map(([d,l])=>(
                  <button key={d} onClick={()=>setAdjustDir(d)} className={`flex-1 py-2 rounded-lg text-sm font-medium border ${adjustDir===d?d==='+'?'bg-green-600 text-white border-green-600':'bg-red-600 text-white border-red-600':'border-gray-200 text-gray-600 hover:bg-gray-50'}`}>{d} {l}</button>
                ))}
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div><label className="block text-xs text-gray-500 mb-1">Quantidade</label>
                  <input type="number" value={adjustQty} onChange={e=>setAdjustQty(e.target.value)} placeholder="0"
                    className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/></div>
                <div><label className="block text-xs text-gray-500 mb-1">Observação</label>
                  <input value={adjustNote} onChange={e=>setAdjustNote(e.target.value)} placeholder="Motivo..."
                    className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/></div>
              </div>
              <button onClick={()=>{ doAdjust(); setSelected(null); }} className="mt-3 w-full py-2.5 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">Confirmar Ajuste</button>
            </div>
          </div>
        )}
      </Modal>

      {/* New Item Modal */}
      <Modal open={newModal} onClose={()=>setNewModal(false)} title="Novo Item de Estoque" size="md">
        <div className="space-y-4">
          {[{label:'SKU *',key:'sku',placeholder:'Ex: NOB-5KVA'},{label:'Nome *',key:'name',placeholder:'Ex: Nobreak 5KVA'},{label:'Localização',key:'loc',placeholder:'Ex: Almox. A — Prat. 1'}].map(f=>(
            <div key={f.key}><label className="block text-sm font-medium text-gray-700 mb-1">{f.label}</label>
              <input value={form[f.key]} onChange={e=>setForm(p=>({...p,[f.key]:e.target.value}))} placeholder={f.placeholder}
                className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/></div>
          ))}
          <div><label className="block text-sm font-medium text-gray-700 mb-1">Categoria</label>
            <select value={form.cat} onChange={e=>setForm(p=>({...p,cat:e.target.value}))} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none">
              {['Equipamentos','Conectores','Cabos','Elétrico','Outros'].map(c=><option key={c}>{c}</option>)}
            </select></div>
          <div className="grid grid-cols-3 gap-3">
            {[{label:'Qtd Inicial',key:'qty',placeholder:'0'},{label:'Qtd Mínima',key:'min',placeholder:'0'},{label:'Custo (R$)',key:'cost',placeholder:'0,00'}].map(f=>(
              <div key={f.key}><label className="block text-sm font-medium text-gray-700 mb-1">{f.label}</label>
                <input type="number" value={form[f.key]} onChange={e=>setForm(p=>({...p,[f.key]:e.target.value}))} placeholder={f.placeholder}
                  className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none"/></div>
            ))}
          </div>
          <div className="flex gap-2 pt-2">
            <button onClick={()=>setNewModal(false)} className="flex-1 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-600 hover:bg-gray-50">Cancelar</button>
            <button onClick={createItem} className="flex-1 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">Cadastrar Item</button>
          </div>
        </div>
      </Modal>

      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
      </div>
      )}

      {invTab==='products'&&(
        <div className="space-y-4">
          <div className="flex items-center justify-between">
            <p className="text-sm text-gray-500">{products.length} produto(s) cadastrado(s)</p>
            <button onClick={()=>setNewProdModal(true)} className="flex items-center gap-1.5 bg-blue-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-blue-700"><Icon name="plus" className="w-4 h-4"/> Novo Produto</button>
          </div>
          <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 border-b border-gray-200"><tr>{['Código','Nome','Categoria','Unid.','Custo Ref.','Descrição',''].map(h=><th key={h} className="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">{h}</th>)}</tr></thead>
              <tbody className="divide-y divide-gray-100">
                {products.map(p=>(
                  <tr key={p.id} className="hover:bg-gray-50">
                    <td className="px-4 py-3 font-mono text-xs text-gray-600">{p.code}</td>
                    <td className="px-4 py-3 font-medium text-gray-800">{p.name}</td>
                    <td className="px-4 py-3 text-xs text-gray-500">{p.cat}</td>
                    <td className="px-4 py-3 text-xs text-gray-500">{p.unit}</td>
                    <td className="px-4 py-3 text-gray-700">{fmt(p.costRef)}</td>
                    <td className="px-4 py-3 text-xs text-gray-400 max-w-xs truncate">{p.desc}</td>
                    <td className="px-4 py-3"><button onClick={async()=>{ const r=await api.deleteProduct(p.id); if(r.success){setProducts(prev=>prev.filter(x=>x.id!==p.id));setInventory(prev=>prev.filter(x=>x.id!==p.id));} }} className="text-xs text-red-400 hover:text-red-600">Remover</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <Modal open={newProdModal} onClose={()=>setNewProdModal(false)} title="Novo Produto" size="md">
            <div className="space-y-4">
              {[{l:'Código *',k:'code',ph:'PROD-007'},{l:'Nome *',k:'name',ph:'Nome do produto'},{l:'Custo de Referência (R$)',k:'costRef',ph:'0.00',type:'number'},{l:'Descrição',k:'desc',ph:'Descrição técnica do produto'}].map(f=>(
                <div key={f.k}><label className="block text-sm font-medium text-gray-700 mb-1">{f.l}</label>
                  <input type={f.type||'text'} value={prodForm[f.k]} onChange={e=>setProdForm(p=>({...p,[f.k]:e.target.value}))} placeholder={f.ph}
                    className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/></div>
              ))}
              <div className="grid grid-cols-2 gap-3">
                <div><label className="block text-sm font-medium text-gray-700 mb-1">Categoria</label>
                  <select value={prodForm.cat} onChange={e=>setProdForm(p=>({...p,cat:e.target.value}))} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none">
                    {['Baterias','Equipamentos','Cabos','Conectores','Elétrico','Outros'].map(c=><option key={c}>{c}</option>)}
                  </select></div>
                <div><label className="block text-sm font-medium text-gray-700 mb-1">Unidade</label>
                  <select value={prodForm.unit} onChange={e=>setProdForm(p=>({...p,unit:e.target.value}))} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none">
                    {['un','cx','kg','m','lt','par'].map(u=><option key={u}>{u}</option>)}
                  </select></div>
              </div>
              <div className="flex gap-2 pt-2">
                <button onClick={()=>setNewProdModal(false)} className="flex-1 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-600 hover:bg-gray-50">Cancelar</button>
                <button onClick={async()=>{
                  if(!prodForm.code.trim()||!prodForm.name.trim())return;
                  const r=await api.createProduct({sku:prodForm.code,name:prodForm.name,category:prodForm.cat,unit_cost:parseFloat(prodForm.costRef||0),description:prodForm.desc});
                  if(r.success){const n=normalizeProduct(r.data);setProducts(p=>[...p,n]);setInventory(p=>[...p,n]);setNewProdModal(false);setProdForm({code:'',name:'',cat:'Equipamentos',unit:'un',costRef:'',desc:''});setToast('Produto cadastrado!');}
                  else setToast(r.error||'Erro ao cadastrar produto');
                }} className="flex-1 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">Cadastrar</button>
              </div>
            </div>
          </Modal>
        </div>
      )}
    </div>
  );
};

// ─── TECHNICIANS ──────────────────────────────────────────────────────────────

const TechniciansPage = () => {
  const [technicians, setTechnicians] = useState([]);
  const [selected, setSelected]       = useState(null);
  const [newModal, setNewModal]       = useState(false);
  const [toast, setToast]             = useState(null);
  const [form, setForm]               = useState({ name:'', phone:'', email:'', specs:'', status:'ACTIVE' });

  useEffect(() => { loadTechnicians(); }, []);
  const loadTechnicians = async () => {
    const r = await api.getTechnicians();
    if (r.success) setTechnicians(r.data?.data || r.data || []);
    else setTechnicians([]);
  };

  const create = async () => {
    if (!form.name || !form.phone) { setToast('Nome e telefone são obrigatórios'); return; }
    const result = await api.createTechnician({
      name: form.name,
      phone: form.phone,
      email: form.email || null,
      specializations: form.specs ? form.specs.split(',').map(s=>s.trim()).filter(Boolean) : [],
      status: form.status
    });
    if (result.success) {
      setTechnicians(p=>[result.data,...p]);
      setNewModal(false);
      setForm({name:'',phone:'',email:'',specs:'',status:'ACTIVE'});
      setToast(`Técnico ${form.name} cadastrado!`);
    } else {
      setToast(`Erro: ${result.error}`);
    }
  };

  const toggleStatus = async id => {
    const t = technicians.find(x=>x.id===id);
    const newStatus = t?.status==='ACTIVE' ? 'ON_LEAVE' : 'ACTIVE';
    const result = await api.updateTechnician(id, { status: newStatus });
    if (result.success) {
      setTechnicians(p=>p.map(x=>x.id===id?{...x,status:newStatus}:x));
      setSelected(null);
      setToast('Status do técnico atualizado!');
    } else {
      setToast(`Erro: ${result.error}`);
    }
  };

  const deleteTech = async id => {
    if (!window.confirm('Excluir este técnico permanentemente?')) return;
    const result = await api.deleteTechnician(id);
    if (result.success) {
      setTechnicians(p=>p.filter(x=>x.id!==id));
      setSelected(null);
      setToast('Técnico excluído.');
    } else {
      setToast(`Erro: ${result.error}`);
    }
  };

  const sel = selected ? technicians.find(t=>t.id===selected.id)||selected : null;

  return (
    <div className="p-5 space-y-4">
      <div className="flex items-center justify-between">
        <div className="flex gap-2">
          <span className="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-medium">{technicians.filter(t=>t.status==='ACTIVE').length} ativos</span>
          <span className="bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-xs font-medium">{technicians.filter(t=>t.status!=='ACTIVE').length} afastados</span>
        </div>
        <button onClick={()=>setNewModal(true)} className="flex items-center gap-1.5 bg-blue-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-blue-700"><Icon name="plus" className="w-4 h-4"/> Novo Técnico</button>
      </div>
      {technicians.length===0&&(
        <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-12 text-center">
          <div className="w-14 h-14 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4">
            <Icon name="technicians" className="w-7 h-7 text-blue-400"/>
          </div>
          <p className="text-gray-600 font-medium mb-1">Nenhum técnico cadastrado</p>
          <p className="text-sm text-gray-400 mb-5">Clique em "Novo Técnico" para adicionar o primeiro.</p>
          <button onClick={()=>setNewModal(true)} className="inline-flex items-center gap-1.5 bg-blue-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-blue-700"><Icon name="plus" className="w-4 h-4"/> Novo Técnico</button>
        </div>
      )}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        {technicians.map(t=>(
          <div key={t.id} onClick={()=>setSelected(t)} className={`bg-white rounded-xl border border-gray-200 shadow-sm p-5 cursor-pointer hover:shadow-md transition-shadow ${t.status!=='ACTIVE'?'opacity-70':''}`}>
            <div className="flex items-start justify-between">
              <div className="flex items-center gap-3">
                <div className="w-12 h-12 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center text-white font-bold text-lg shrink-0">{(t.name||'?')[0]}</div>
                <div>
                  <h3 className="font-semibold text-gray-800">{t.name}</h3>
                  <p className="text-sm text-gray-500">{t.phone}</p>
                  <div className="flex flex-wrap gap-1 mt-1">
                    {(t.specializations||t.specs||[]).map(s=><span key={s} className="px-2 py-0.5 bg-blue-50 text-blue-600 text-xs rounded border border-blue-100">{s}</span>)}
                  </div>
                </div>
              </div>
              <Badge status={t.status}/>
            </div>
            {t.status==='ACTIVE'&&(
              <div className="grid grid-cols-3 gap-2 mt-4 pt-4 border-t border-gray-100">
                <div className="text-center"><p className="text-xl font-bold text-gray-800">{t.orders||0}</p><p className="text-xs text-gray-400">OS / mês</p></div>
                <div className="text-center"><p className="text-xl font-bold text-gray-800">{t.avg_time||t.avgMin||'—'}<span className="text-sm font-normal text-gray-400">min</span></p><p className="text-xs text-gray-400">Tempo médio</p></div>
                <div className="text-center"><p className={`text-xl font-bold ${(t.rework_percentage||t.rework||0)>5?'text-red-600':'text-green-600'}`}>{t.rework_percentage||t.rework||0}%</p><p className="text-xs text-gray-400">Retrabalho</p></div>
              </div>
            )}
          </div>
        ))}
      </div>

      {/* Tech Detail Modal */}
      <Modal open={!!sel} onClose={()=>setSelected(null)} title={sel?.name||''} size="md">
        {sel&&(
          <div className="space-y-5">
            <div className="flex items-center gap-3">
              <div className="w-14 h-14 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center text-white font-bold text-2xl">{(sel.name||'?')[0]}</div>
              <div><h3 className="font-semibold text-gray-800 text-lg">{sel.name}</h3><Badge status={sel.status}/></div>
            </div>
            <div className="grid grid-cols-2 gap-4">
              <div className="flex items-center gap-2"><Icon name="phone" className="w-4 h-4 text-gray-400"/><a href={`tel:${sel.phone}`} className="text-sm text-blue-600">{sel.phone}</a></div>
              <div className="flex items-center gap-2"><Icon name="mail" className="w-4 h-4 text-gray-400"/><a href={`mailto:${sel.email}`} className="text-sm text-blue-600">{sel.email||'—'}</a></div>
            </div>
            <div>
              <p className="text-xs text-gray-400 mb-2">Especializações</p>
              <div className="flex flex-wrap gap-2">{(sel.specializations||sel.specs||[]).map(s=><span key={s} className="px-2.5 py-1 bg-blue-50 text-blue-600 text-sm rounded-lg border border-blue-100">{s}</span>)}</div>
            </div>
            {sel.status==='ACTIVE'&&(
              <div className="bg-gray-50 rounded-xl p-4 grid grid-cols-3 gap-4 text-center">
                <div><p className="text-2xl font-bold text-gray-800">{sel.orders||0}</p><p className="text-xs text-gray-400 mt-0.5">OS este mês</p></div>
                <div><p className="text-2xl font-bold text-gray-800">{sel.avg_time||sel.avgMin||'—'}<span className="text-sm font-normal text-gray-400">min</span></p><p className="text-xs text-gray-400 mt-0.5">Tempo médio</p></div>
                <div><p className={`text-2xl font-bold ${(sel.rework_percentage||sel.rework||0)>5?'text-red-600':'text-green-600'}`}>{sel.rework_percentage||sel.rework||0}%</p><p className="text-xs text-gray-400 mt-0.5">Retrabalho</p></div>
              </div>
            )}
            <div className="flex gap-2 pt-2 border-t border-gray-100">
              <button onClick={()=>toggleStatus(sel.id)} className={`flex-1 py-2.5 border rounded-lg text-sm font-medium ${sel.status==='ACTIVE'?'border-amber-300 text-amber-700 hover:bg-amber-50':'border-green-300 text-green-700 hover:bg-green-50'}`}>
                {sel.status==='ACTIVE'?'Registrar Afastamento':'Retornar ao Trabalho'}
              </button>
              <button onClick={()=>deleteTech(sel.id)} className="px-4 py-2.5 border border-red-200 text-red-600 rounded-lg text-sm font-medium hover:bg-red-50">Excluir</button>
              <button onClick={()=>setSelected(null)} className="px-4 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-600 hover:bg-gray-50">Fechar</button>
            </div>
          </div>
        )}
      </Modal>

      {/* Novo Técnico Modal */}
      <Modal open={newModal} onClose={()=>setNewModal(false)} title="Novo Técnico" size="md">
        <div className="space-y-4">
          {[
            {label:'Nome Completo *', key:'name',  placeholder:'Ex: André Ferreira'},
            {label:'Telefone *',      key:'phone', placeholder:'(17) 99999-0000'},
            {label:'E-mail',          key:'email', placeholder:'andre@opticom.com.br'},
            {label:'Especializações', key:'specs', placeholder:'Ex: Instalação, Emergência (separar por vírgula)'},
          ].map(f=>(
            <div key={f.key}><label className="block text-sm font-medium text-gray-700 mb-1">{f.label}</label>
              <input value={form[f.key]} onChange={e=>setForm(p=>({...p,[f.key]:e.target.value}))} placeholder={f.placeholder}
                className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/></div>
          ))}
          <div className="flex gap-2 pt-2">
            <button onClick={()=>setNewModal(false)} className="flex-1 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-600 hover:bg-gray-50">Cancelar</button>
            <button onClick={create} className="flex-1 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">Cadastrar Técnico</button>
          </div>
        </div>
      </Modal>
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
};

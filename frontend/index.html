const FleetPage = () => {
  const [vehicles, setVehicles]     = useState([]);
  const [technicians, setTechs]     = useState([]);
  const [maintenance, setMaint]     = useState([]);
  const [selected, setSelected]     = useState(null);
  const [newModal, setNewModal]     = useState(false);
  const [toast, setToast]           = useState(null);
  const [form, setForm]             = useState({ plate:'', model:'', year:'', assigned_technician_id:'' });
  const [odoEdit, setOdoEdit]       = useState('');
  const [maintForm, setMaintForm]   = useState({date:'',type:'Preventiva',desc:'',km:'',cost:'',tech:''});

  useEffect(() => {
    api.getVehicles().then(r => setVehicles(r.data?.data || r.data || []));
    api.getTechnicians().then(r => setTechs(r.data?.data || r.data || []));
  }, []);

  useEffect(() => {
    if (selected?.id) {
      api.getVehicleMaintenance(selected.id).then(r => {
        if (r.success) setMaint(r.data || []);
      });
    } else {
      setMaint([]);
    }
  }, [selected?.id]);

  const create = async () => {
    if (!form.plate || !form.model) { setToast('Placa e modelo são obrigatórios'); return; }
    const result = await api.createVehicle({
      plate: form.plate.toUpperCase(),
      model: form.model,
      year: parseInt(form.year) || new Date().getFullYear(),
      assigned_technician_id: form.assigned_technician_id || null,
      status: 'AVAILABLE'
    });
    if (result.success) {
      setVehicles(p=>[result.data,...p]);
      setNewModal(false);
      setForm({plate:'',model:'',year:'',assigned_technician_id:''});
      setToast(`Veículo ${result.data.plate} cadastrado!`);
    } else {
      setToast(`Erro: ${result.error}`);
    }
  };

  const updateOdo = async id => {
    const km = parseInt(odoEdit) || 0;
    const result = await api.updateVehicle(id, { odometer: km });
    if (result.success) {
      setVehicles(p=>p.map(v=>v.id===id?{...v,odometer:km}:v));
      setSelected(prev=>prev?{...prev,odometer:km}:null);
      setOdoEdit('');
      setToast('Odômetro atualizado!');
    } else {
      setToast(`Erro: ${result.error}`);
    }
  };

  const changeStatus = async (id, status) => {
    const result = await api.updateVehicle(id, { status });
    if (result.success) {
      setVehicles(p=>p.map(v=>v.id===id?{...v,status}:v));
      setSelected(prev=>prev?{...prev,status}:null);
      setToast('Status do veículo atualizado!');
    } else {
      setToast(`Erro: ${result.error}`);
    }
  };

  const sel = selected ? vehicles.find(v=>v.id===selected.id)||selected : null;

  return (
    <div className="p-5 space-y-4">
      <div className="grid grid-cols-2 xl:grid-cols-4 gap-4">
        <KPI title="Frota Total"    value={`${vehicles.length} veículos`} sub={`${vehicles.filter(v=>v.status==='IN_USE').length} em campo`} icon="fleet" color="blue"/>
        <KPI title="Disponíveis"    value={vehicles.filter(v=>v.status==='AVAILABLE').length} sub="prontos para uso" icon="fleet" color="green"/>
        <KPI title="Em Manutenção" value={vehicles.filter(v=>v.status==='MAINTENANCE').length} sub="fora de operação" icon="audit" color="orange"/>
        <KPI title="Km Total Frota" value={`${vehicles.reduce((s,v)=>s+v.odometer,0).toLocaleString('pt-BR')} km`} sub="odômetro acumulado" icon="fleet" color="purple"/>
      </div>
      <div className="flex items-center justify-between">
        <h3 className="text-sm font-semibold text-gray-700">Frota Cadastrada</h3>
        <button onClick={()=>setNewModal(true)} className="flex items-center gap-1.5 bg-blue-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-blue-700"><Icon name="plus" className="w-4 h-4"/> Novo Veículo</button>
      </div>
      <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
        <table className="w-full text-sm">
          <thead className="bg-gray-50 border-b border-gray-200"><tr>{['Placa','Modelo','Ano','Responsável','Status','Odômetro','Próx. Revisão',''].map(h=><th key={h} className="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">{h}</th>)}</tr></thead>
          <tbody className="divide-y divide-gray-100">
            {vehicles.map(v=>(
              <tr key={v.id} className="hover:bg-gray-50 cursor-pointer" onClick={()=>{ setSelected(v); setOdoEdit(String(v.odometer)); }}>
                <td className="px-4 py-3 font-mono font-bold text-gray-700">{v.plate}</td>
                <td className="px-4 py-3 text-gray-800">{v.model}</td>
                <td className="px-4 py-3 text-gray-600">{v.year}</td>
                <td className="px-4 py-3 text-gray-600">{v.technicians?.name||<span className="text-gray-300">—</span>}</td>
                <td className="px-4 py-3"><Badge status={v.status}/></td>
                <td className="px-4 py-3 text-gray-700">{(v.odometer||0).toLocaleString('pt-BR')} km</td>
                <td className="px-4 py-3 text-xs text-gray-500">{fmtDate(v.next_service_date||v.nextService)}</td>
                <td className="px-4 py-3"><button className="text-xs text-blue-600 hover:underline font-medium">Detalhes →</button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Vehicle Detail Modal */}
      <Modal open={!!sel} onClose={()=>setSelected(null)} title={`${sel?.plate||''} — ${sel?.model||''}`} size="md">
        {sel&&(
          <div className="space-y-5">
            <div className="flex items-center gap-2"><Badge status={sel.status}/><span className="text-sm text-gray-500">{sel.year}</span></div>
            <div className="grid grid-cols-2 gap-4">
              <LabelField label="Modelo"      value={sel.model}/>
              <LabelField label="Ano"         value={sel.year}/>
              <LabelField label="Responsável" value={sel.tech||'Não atribuído'}/>
              <LabelField label="Última Revisão" value={fmtDate(sel.lastService)}/>
              <LabelField label="Próx. Revisão"  value={fmtDate(sel.nextService)}/>
            </div>
            <div>
              <p className="text-xs text-gray-400 mb-1">Odômetro (km)</p>
              <div className="flex gap-2">
                <input type="number" value={odoEdit} onChange={e=>setOdoEdit(e.target.value)} className="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                <button onClick={()=>updateOdo(sel.id)} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">Salvar</button>
              </div>
            </div>
            <div>
              <p className="text-xs text-gray-400 mb-2">Alterar Status</p>
              <div className="flex gap-2">
                {['AVAILABLE','IN_USE','MAINTENANCE'].map(s=>(
                  <button key={s} onClick={()=>changeStatus(sel.id,s)} className={`flex-1 py-2 text-xs rounded-lg border transition-colors ${sel.status===s?'bg-blue-600 text-white border-blue-600':'border-gray-200 text-gray-600 hover:bg-gray-50'}`}>
                    {STATUS_MAP[s]?.[1]||s}
                  </button>
                ))}
              </div>
            </div>
            <div className="border-t border-gray-100 pt-4">
              <div className="flex items-center justify-between mb-3">
                <p className="text-sm font-semibold text-gray-700">Histórico de Manutenção</p>
                <span className="text-xs text-gray-400">{maintenance.length} registro(s)</span>
              </div>
              <div className="space-y-2 max-h-40 overflow-y-auto mb-3">
                {maintenance.length===0
                  ? <p className="text-xs text-gray-400 text-center py-2">Nenhum registro ainda</p>
                  : maintenance.map(m=>(
                      <div key={m.id} className="bg-gray-50 rounded-lg p-2.5 text-xs">
                        <div className="flex items-center justify-between mb-0.5">
                          <span className={`font-semibold px-1.5 py-0.5 rounded ${m.type==='Preventiva'?'bg-green-100 text-green-700':'bg-orange-100 text-orange-700'}`}>{m.type}</span>
                          <span className="text-gray-400">{fmtDate(m.date)} · {m.km?.toLocaleString('pt-BR')} km</span>
                        </div>
                        <p className="text-gray-700 mt-0.5">{m.description||m.desc}</p>
                        <div className="flex justify-between mt-0.5 text-gray-400">
                          <span>Técnico: {m.technician_name||m.tech||'—'}</span>
                          <span className="font-medium text-gray-600">{fmt(m.cost)}</span>
                        </div>
                      </div>
                    ))}
              </div>
              <div className="border border-gray-200 rounded-xl p-3 space-y-2 bg-gray-50">
                <p className="text-xs font-semibold text-gray-600">Registrar Manutenção</p>
                <div className="grid grid-cols-2 gap-2">
                  <div><label className="text-xs text-gray-400">Data</label>
                    <input type="date" value={maintForm.date} onChange={e=>setMaintForm(p=>({...p,date:e.target.value}))} className="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"/></div>
                  <div><label className="text-xs text-gray-400">Tipo</label>
                    <select value={maintForm.type} onChange={e=>setMaintForm(p=>({...p,type:e.target.value}))} className="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-xs focus:outline-none bg-white">
                      <option>Preventiva</option><option>Corretiva</option><option>Revisão</option>

                <div className="flex-1">
                  <p className="text-sm font-medium text-gray-800">{l}</p>
                  <p className="text-xs text-gray-400">{sub}</p>
                </div>
                <div className="flex items-center gap-2">
                  <input type="number" value={sla[k]} onChange={e=>setSla(p=>({...p,[k]:parseInt(e.target.value)||0}))} className="w-20 border border-gray-300 rounded-lg px-3 py-2 text-sm text-center focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                  <span className="text-sm text-gray-500">horas</span>
                </div>
              </div>
            ))}
          </div>
          <div className="flex justify-end pt-2 border-t border-gray-100">
            <button onClick={saveSla} className="px-6 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">Salvar SLAs</button>
          </div>
        </div>
      )}

      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
};

// ─── AUDIT ────────────────────────────────────────────────────────────────────

const AuditPage = () => {
  const [moduleF, setModuleF] = useState('all');
  const [userF, setUserF]     = useState('all');
  const [q, setQ]             = useState('');

  const modules = ['all',...new Set(AUDIT_LOG.map(a=>a.module))];
  const users   = ['all',...new Set(AUDIT_LOG.map(a=>a.user))];

  const filtered = AUDIT_LOG.filter(a=>
    (moduleF==='all'||a.module===moduleF)&&
    (userF==='all'||a.user===userF)&&
    (!q||a.action.toLowerCase().includes(q.toLowerCase())||a.detail.toLowerCase().includes(q.toLowerCase()))
  );

  const moduleColors = { OS:'bg-blue-50 text-blue-700', Financeiro:'bg-green-50 text-green-700', Contratos:'bg-purple-50 text-purple-700', Clientes:'bg-orange-50 text-orange-700', Estoque:'bg-amber-50 text-amber-700', Sistema:'bg-gray-100 text-gray-600' };

  return (
    <div className="p-5 space-y-4">
      <div className="grid grid-cols-3 gap-4">
        <KPI title="Eventos Hoje"    value={AUDIT_LOG.filter(a=>a.time.startsWith('04/04')).length} sub="04/04/2026"  icon="audit" color="blue"/>
        <KPI title="Usuários Ativos" value={new Set(AUDIT_LOG.map(a=>a.user)).size} sub="neste período" icon="technicians" color="green"/>
        <KPI title="Módulos Usados"  value={new Set(AUDIT_LOG.map(a=>a.module)).size} sub="áreas acessadas" icon="dashboard" color="purple"/>
      </div>
      <div className="flex items-center gap-3">
        <div className="relative"><Icon name="search" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"/>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar evento ou detalhe..."
            className="pl-9 pr-4 py-2 text-sm border border-gray-200 rounded-lg w-72 focus:outline-none focus:ring-2 focus:ring-blue-500"/></div>
        <select value={moduleF} onChange={e=>setModuleF(e.target.value)} className="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none">
          {modules.map(m=><option key={m} value={m}>{m==='all'?'Todos os módulos':m}</option>)}
        </select>
        <select value={userF} onChange={e=>setUserF(e.target.value)} className="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none">
          {users.map(u=><option key={u} value={u}>{u==='all'?'Todos os usuários':u}</option>)}
        </select>
        <span className="ml-auto text-xs text-gray-400">{filtered.length} eventos</span>
      </div>
      <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
        <table className="w-full text-sm">
          <thead className="bg-gray-50 border-b border-gray-200">
            <tr>{['Data/Hora','Usuário','Módulo','Ação','Detalhe'].map(h=><th key={h} className="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">{h}</th>)}</tr>
          </thead>
          <tbody className="divide-y divide-gray-100">
            {filtered.map(a=>(
              <tr key={a.id} className="hover:bg-gray-50">
                <td className="px-4 py-3 text-xs text-gray-500 font-mono whitespace-nowrap">{a.time}</td>
                <td className="px-4 py-3">
                  <div className="flex items-center gap-2">
                    <div className="w-6 h-6 rounded-full bg-blue-500 flex items-center justify-center text-white text-xs font-bold shrink-0">{a.user[0]}</div>
                    <span className="text-sm text-gray-800">{a.user}</span>
                  </div>
                </td>
                <td className="px-4 py-3"><span className={`px-2 py-0.5 rounded text-xs font-medium ${moduleColors[a.module]||'bg-gray-100 text-gray-600'}`}>{a.module}</span></td>
                <td className="px-4 py-3 text-gray-700 font-medium">{a.action}</td>
                <td className="px-4 py-3 text-xs text-gray-500">{a.detail}</td>
              </tr>
            ))}
            {filtered.length===0&&<tr><td colSpan="5" className="px-4 py-10 text-center text-sm text-gray-400">Nenhum evento encontrado</td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
};

// ─── APP ──────────────────────────────────────────────────────────────────────

function App() {
  const [loggedIn, setLoggedIn] = useState(false);
  const [loading, setLoading] = useState(true);
  const [page, setPage]         = useState('dashboard');
  const [user, setUser]         = useState(() => api.user);
  const [collapsed, setCollapsed] = useState(false);
  // Regime tributário global — propagado por toda a aplicação
  const [taxRegime, setTaxRegime] = useState(() => localStorage.getItem('opticom_taxRegime') || 'REAL');
  // Permissões por perfil
  const [permissions, setPermissions] = useState(() => {
    try { return JSON.parse(localStorage.getItem('opticom_permissions')) || DEFAULT_PERMISSIONS; }
    catch { return DEFAULT_PERMISSIONS; }
  });
  const savePermissions = p => { setPermissions(p); localStorage.setItem('opticom_permissions', JSON.stringify(p)); };
  // Configurações financeiras globais
  const [incomeCats,  setIncomeCats]  = useState(INCOME_CATS_INIT);
  const [expenseCats, setExpenseCats] = useState(EXPENSE_CATS_INIT);
  const [bankAccounts,setBankAccounts]= useState(BANK_ACCOUNTS_INIT);
  const [payMethods,  setPayMethods]  = useState(PAYMENT_METHODS_INIT);

  useEffect(() => {
    if (!api.token) return;
    api.getBankAccounts().then(r => {
      if (r.success) setBankAccounts((r.data || []).map(b => ({
        ...b,
        bank: b.bank_name || b.name || '',
        account: b.account_number || b.account || '',
        agency: b.agency || '—',
        type: b.type || 'Corrente',
        balance: b.balance || 0,
        active: b.active !== undefined ? b.active : true
      })));
    });
    api.getPaymentMethods().then(r => {
      if (r.success) setPayMethods((r.data || []).map(m => ({
        ...m,
        active: m.active !== undefined ? m.active : true
      })));
    });
  }, []);

  // Sincronizar loggedIn com token em sessionStorage
  // Verificar continuamente para detectar logout automático via 401
  useEffect(() => {
    const checkAuth = () => {
      const token = sessionStorage.getItem('opticom_token');
      // api.user é restaurado do sessionStorage no constructor — basta checar o token
      const isAuthenticated = !!token;
      setLoggedIn(isAuthenticated);
    };

    // Check inicial
    checkAuth();
    setLoading(false);

    // Verificar a cada 500ms - detecta logout automático quando há erro 401
    const interval = setInterval(checkAuth, 500);
    return () => clearInterval(interval);
  }, []);

  if (!loggedIn) return <LoginPage onLogin={()=>{ setUser(api.user); setLoggedIn(true); }}/>;

  const renderPage = () => {
    const role = user?.role || 'TECHNICIAN';
    const allowed = new Set((permissions||DEFAULT_PERMISSIONS)[role] || []);
    if (page !== 'dashboard' && !allowed.has(page)) {
      return <div className="p-10 text-center"><p className="text-gray-400 text-sm">Você não tem permissão para acessar esta página.</p><button onClick={()=>setPage('dashboard')} className="mt-4 text-blue-600 text-sm hover:underline">← Voltar ao Dashboard</button></div>;
    }
    switch(page) {
      case 'dashboard':   return <DashboardPage setPage={setPage} taxRegime={taxRegime}/>;
      case 'orders':      return <OrdersPage taxRegime={taxRegime}/>;
      case 'customers':   return <CustomersPage setPage={setPage}/>;
      case 'contracts':   return <ContractsPage taxRegime={taxRegime}/>;
      case 'financial':   return <FinancialPage taxRegime={taxRegime}/>;
      case 'inventory':   return <InventoryPage/>;
      case 'technicians': return <TechniciansPage/>;
      case 'fleet':       return <FleetPage/>;
      case 'settings':    return <SettingsPage taxRegime={taxRegime} setTaxRegime={setTaxRegime} incomeCats={incomeCats} setIncomeCats={setIncomeCats} expenseCats={expenseCats} setExpenseCats={setExpenseCats} bankAccounts={bankAccounts} setBankAccounts={setBankAccounts} payMethods={payMethods} setPayMethods={setPayMethods} permissions={permissions} savePermissions={savePermissions}/>;
      default:            return <div className="p-10 text-center text-gray-400">Módulo não encontrado</div>;
    }
  };

  const regime = TAX_REGIMES[taxRegime];
  return (
    <div className="flex h-screen overflow-hidden">
      <Sidebar page={page} setPage={setPage} collapsed={collapsed} setCollapsed={setCollapsed} user={user} permissions={permissions}/>
      <div className="flex-1 flex flex-col overflow-hidden">
        <Header page={page} onLogout={()=>setLoggedIn(false)} setPage={setPage} regime={regime} user={user}/>
        <main className="flex-1 overflow-y-auto bg-gray-50">
          {renderPage()}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

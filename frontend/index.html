    * { box-sizing: border-box; }

    /* ── Scrollbars finas em toda a página ──────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* ── Todo container que envolve uma <table> rola na horizontal ─ */
    /* Usa :has() — suportado em Chrome 105+, Safari 15.4+, Firefox 121+ */
    .overflow-hidden:has(> table),
    .overflow-hidden:has(> div > table),
    .overflow-hidden:has(> .overflow-x-auto) {
      overflow-x: auto !important;
    }

    /* ── Garante que tabelas nunca quebrem o layout ─────────────── */
    table {
      min-width: max-content;
    }

    /* ── Grids multi-coluna responsivos ─────────────────────────── */
    /* Containers diretos de página com padding p-5/p-6 têm scroll */
    .p-5.space-y-4,
    .p-5.space-y-5,
    .p-6.space-y-4,
    .p-6.space-y-5 {
      min-width: 0;
    }

    /* ── Conteúdo principal de cada página ──────────────────────── */
    /* O flex-1 overflow-y-auto recebe também overflow-x */
    .flex-1.overflow-y-auto {
      overflow-x: auto;
    }

    /* ── Grids que podem ser largos demais ──────────────────────── */
    /* Permite scroll horizontal nos grid containers sem quebrar o layout */
    .grid {
      min-width: 0;
    }
    .grid > * {

const KPI = ({ title, value, sub, icon, color='blue', trend, trendLabel }) => {
  const C = { blue:'bg-blue-50 text-blue-600', green:'bg-green-50 text-green-600', red:'bg-red-50 text-red-600', orange:'bg-orange-50 text-orange-600', purple:'bg-purple-50 text-purple-600' };
  return (
    <div className="bg-white rounded-xl p-5 border border-gray-200 shadow-sm">
      <div className="flex items-start justify-between">
        <div className="flex-1 min-w-0">
          <p className="text-xs font-medium text-gray-500 uppercase tracking-wide">{title}</p>
          <p className="text-2xl font-bold text-gray-900 mt-1">{value}</p>
          {sub && <p className="text-xs text-gray-400 mt-0.5">{sub}</p>}
          {trend !== undefined && (
            <div className={`flex items-center gap-1 mt-1.5 text-xs font-medium ${trend>=0?'text-green-600':'text-red-500'}`}>
              <span>{trend>=0?'▲':'▼'}</span>{Math.abs(trend)}% {trendLabel}
            </div>
          )}
        </div>
        <div className={`${C[color]} p-3 rounded-xl shrink-0`}><Icon name={icon} className="w-6 h-6"/></div>
      </div>
    </div>
  );
};

const Gauge = ({ score }) => {
  const cx=100, cy=90, r=65;
  const color = score>=80?'#10b981':score>=60?'#3b82f6':score>=40?'#f59e0b':'#ef4444';
  const label = score>=80?'EXCELENTE':score>=60?'BOM':score>=40?'ATENÇÃO':'CRÍTICO';
  const t=score/100, rad=(1-t)*Math.PI;
  const sx=(cx+r*Math.cos(rad)).toFixed(2), sy=(cy-r*Math.sin(rad)).toFixed(2);
  const bg=`M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}`;
  const sc=score>0?`M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${sx} ${sy}`:'';
  const nx=cx+(r-14)*Math.cos(rad), ny=cy-(r-14)*Math.sin(rad);
  return (
    <svg width="200" height="110" viewBox="0 0 200 110">
      <path d={bg} fill="none" stroke="#e5e7eb" strokeWidth="14" strokeLinecap="round"/>
      {sc&&<path d={sc} fill="none" stroke={color} strokeWidth="14" strokeLinecap="round"/>}
      <line x1={cx} y1={cy} x2={nx.toFixed(1)} y2={ny.toFixed(1)} stroke="#374151" strokeWidth="2.5" strokeLinecap="round"/>
      <circle cx={cx} cy={cy} r="4" fill="#374151"/>
      <text x={cx} y={cy-22} textAnchor="middle" fill={color} fontSize="26" fontWeight="bold" fontFamily="sans-serif">{score}</text>
      <text x={cx} y={cy+16} textAnchor="middle" fill="#9ca3af" fontSize="10" fontFamily="sans-serif">{label}</text>
      <text x={cx-r+2} y={cy+18} fill="#d1d5db" fontSize="9" fontFamily="sans-serif">0</text>
      <text x={cx+r-10} y={cy+18} fill="#d1d5db" fontSize="9" fontFamily="sans-serif">100</text>
    </svg>
  );
};

const LineChart = ({ data, color='#3b82f6', height=140 }) => {
  const W=300, H=height-10, vals=data.map(d=>d.v), mn=Math.min(...vals), mx=Math.max(...vals), rng=mx-mn||1;
  const pts=data.map((d,i)=>[(i/(data.length-1))*W, H-((d.v-mn)/rng)*H]);
  const pl=pts.map(p=>p.join(',')).join(' '), area=`0,${H} ${pl} ${W},${H}`;
  return (
    <svg viewBox={`0 0 ${W} ${H+2}`} style={{width:'100%',height}} preserveAspectRatio="none">
      <defs><linearGradient id={`g${color.replace('#','')}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.15"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <polygon points={area} fill={`url(#g${color.replace('#','')})`}/>
      <polyline points={pl} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round"/>
      {pts.map(([x,y],i)=><circle key={i} cx={x} cy={y} r="3.5" fill={color}/>)}
    </svg>
  );
};

const Modal = ({ open, onClose, title, size='md', locked=false, children }) => {
  if (!open) return null;
  const widths = { sm:'max-w-sm', md:'max-w-lg', lg:'max-w-2xl', xl:'max-w-4xl' };
  const handleBackdrop = locked ? undefined : onClose;
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm" onClick={handleBackdrop}>
      <div className={`bg-white rounded-2xl shadow-2xl ${widths[size]} w-full mx-4 max-h-[88vh] flex flex-col`} onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between px-6 py-4 border-b border-gray-200 shrink-0">
          <h2 className="text-base font-semibold text-gray-800">{title}</h2>
          {!locked && <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600 text-xl leading-none">×</button>}
        </div>
        <div className="overflow-y-auto flex-1 p-6">{children}</div>
      </div>
    </div>
  );
};

const Toast = ({ msg, type='success', onClose }) => {
  useEffect(()=>{ const t=setTimeout(onClose,3200); return()=>clearTimeout(t); },[]);
  const colors = { success:'bg-gray-900 text-white', error:'bg-red-600 text-white', info:'bg-blue-600 text-white' };
  const icons  = { success:'✓', error:'✕', info:'ℹ' };
  return (
    <div className={`fixed bottom-5 right-5 z-[100] ${colors[type]||colors.success} text-sm px-4 py-3 rounded-xl shadow-xl flex items-center gap-3`}>
      <span className="text-green-400">{icons[type]||'✓'}</span> {msg}
      <button onClick={onClose} className="text-gray-400 hover:text-white ml-1">×</button>
    </div>
  );
};

// FormField com validação integrada
const FormField = ({ label, value, onChange, error, type = 'text', placeholder = '', required = false, disabled = false, validator = null, onBlur = null }) => {
  const [touched, setTouched] = useState(false);
  const [fieldError, setFieldError] = useState(error || '');

  const handleChange = (e) => {
    const newValue = e.target.value;
    onChange(newValue);

    if (touched && validator) {
      const result = validator(newValue);
      setFieldError(result.error);
    }
  };

  const handleBlur = () => {
    setTouched(true);
    if (validator) {
      const result = validator(value);
      setFieldError(result.error);
    }
    if (onBlur) onBlur();
  };

  const showError = touched && fieldError;

  return (
    <div>
      <label className="block text-sm font-medium text-gray-700 mb-1.5">
        {label}
        {required && <span className="text-red-500 ml-1">*</span>}
      </label>
      <input
        type={type}
        value={value}
        onChange={handleChange}
        onBlur={handleBlur}
        placeholder={placeholder}
        disabled={disabled}
        className={`w-full border rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 transition-colors ${
          showError
            ? 'border-red-300 focus:ring-red-500 bg-red-50'
            : 'border-gray-300 focus:ring-blue-500 focus:border-transparent'
        } ${disabled ? 'bg-gray-100 cursor-not-allowed' : ''}`}
      />
      {showError && <p className="text-red-500 text-xs mt-1">{fieldError}</p>}
    </div>
  );
};

  const [notifOpen, setNotifOpen] = useState(false);
  const [dismissed, setDismissed] = useState([]);
  const visible = MOCK_ALERTS.filter(a=>!dismissed.includes(a.id));
  const navMap = { OVERDUE_RECEIVABLE:'financial', BATTERY_END_OF_LIFE:'inventory', LOW_STOCK:'inventory', OVERDUE_ORDER:'orders', CONTRACT_EXPIRING:'contracts' };
  return (
    <header className="bg-white border-b border-gray-200 px-6 py-3.5 flex items-center justify-between sticky top-0 z-20 shadow-sm">
      <div className="flex items-center gap-3">
        <h1 className="text-lg font-semibold text-gray-800">{TITLES[page]||page}</h1>
        {regime&&<span className={`inline-flex items-center gap-1.5 text-xs font-semibold px-2.5 py-1 rounded-full ${regime.color}`}>
          <span className={`w-1.5 h-1.5 rounded-full ${regime.dot}`}/>
          {regime.short}
        </span>}
      </div>
      <div className="flex items-center gap-3">
        <div className="relative">
          <button onClick={()=>setNotifOpen(v=>!v)} className="p-2 rounded-lg hover:bg-gray-100 text-gray-500 relative">
            <Icon name="bell" className="w-5 h-5"/>
            {visible.length>0&&<span className="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"/>}
          </button>
          {notifOpen&&(
            <div className="absolute right-0 top-10 w-96 bg-white border border-gray-200 rounded-2xl shadow-2xl z-50 overflow-hidden">
              <div className="flex items-center justify-between px-4 py-3 border-b border-gray-100">
                <p className="text-sm font-semibold text-gray-800">Notificações {visible.length>0&&<span className="ml-1.5 bg-red-500 text-white text-xs px-1.5 py-0.5 rounded-full">{visible.length}</span>}</p>
                {visible.length>0&&<button onClick={()=>setDismissed(MOCK_ALERTS.map(a=>a.id))} className="text-xs text-blue-600 hover:underline">Marcar todas como lidas</button>}
              </div>
              {visible.length===0&&<p className="text-sm text-gray-400 text-center py-8">Nenhuma notificação pendente</p>}
              {visible.map(a=>{
                const sev={HIGH:['border-l-red-500','🔴'],MEDIUM:['border-l-amber-400','🟡'],LOW:['border-l-blue-400','🔵']}[a.severity];
                return (
                  <div key={a.id} className={`border-l-4 ${sev[0]} px-4 py-3 border-b border-gray-50 hover:bg-gray-50 flex items-start gap-2`}>
                    <span className="text-sm mt-0.5">{sev[1]}</span>
                    <div className="flex-1 min-w-0">
                      <p className="text-sm font-medium text-gray-800">{a.title}</p>
                      <p className="text-xs text-gray-500 mt-0.5">{a.message}</p>
                    </div>
                    <div className="flex gap-1 shrink-0">
                      <button onClick={()=>{setPage(navMap[a.type]||'dashboard');setNotifOpen(false);}} className="text-xs text-blue-600 hover:underline">Ver</button>
                      <button onClick={()=>setDismissed(p=>[...p,a.id])} className="text-xs text-gray-400 hover:text-gray-600 ml-1">✕</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
        <div className="flex items-center gap-2 text-sm text-gray-600 border-l border-gray-200 pl-3">
          <div className="w-7 h-7 bg-blue-600 rounded-full flex items-center justify-center text-white text-xs font-bold">{(user?.name||'?')[0]}</div>
          <div className="hidden sm:block">
            <p className="text-sm font-medium text-gray-700">{user?.name||'Usuário'}</p>
            <p className="text-xs text-gray-400">{user?.company?.name||'Opticom'}</p>
          </div>
        </div>
        <button onClick={onLogout} className="flex items-center gap-1.5 text-sm text-gray-500 hover:text-red-600 px-2 py-1.5 rounded-lg hover:bg-red-50 transition-colors">
          <Icon name="logout" className="w-4 h-4"/>
        </button>
      </div>
    </header>
  );
};

const MONTH_NAMES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

const DashboardPage = ({ setPage, taxRegime='REAL' }) => {
  const [period, setPeriod] = useState('month');
  const [pipelineModal, setPipelineModal] = useState(null);
  const [toast, setToast] = useState(null);
  const [pipelineFrom, setPipelineFrom] = useState('');
  const [pipelineTo, setPipelineTo] = useState('');
  const [dashMonth, setDashMonth] = useState(() => new Date().toISOString().slice(0,7));
  const [stats, setStats] = useState({ openOrders:0, completedOrders:0, invoicedOrders:0, activeContracts:0, totalCustomers:0, lowStockItems:0, receivedRevenue:0, paidExpense:0, pendingRevenue:0, pendingExpense:0 });
  const [allOrders, setAllOrders] = useState([]);
  const [chartData, setChartData] = useState([]);
  const [alerts, setAlerts] = useState([]);
  const d = PERIOD_DATA[period];

  useEffect(() => { loadDashboard(dashMonth); }, [dashMonth]);

  const buildWeeklyChart = (txs, month) => {
    if (!month || !txs.length) return [];
    const [y, m] = month.split('-').map(Number);
    const last = new Date(y, m, 0).getDate();
    const pad = n => String(n).padStart(2,'0');
    return [
      { label:'Sem 1', from:`${month}-01`, to:`${month}-07` },
      { label:'Sem 2', from:`${month}-08`, to:`${month}-14` },
      { label:'Sem 3', from:`${month}-15`, to:`${month}-21` },
      { label:'Sem 4', from:`${month}-22`, to:`${month}-${pad(last)}` },
    ].map(w=>({
      label: w.label,
      a: txs.filter(t=>t.type==='INCOME' &&(t.due_date||'')>=w.from&&(t.due_date||'')<=w.to).reduce((s,t)=>s+(t.amount||0),0),
      b: txs.filter(t=>t.type==='EXPENSE'&&(t.due_date||'')>=w.from&&(t.due_date||'')<=w.to).reduce((s,t)=>s+(t.amount||0),0),
    }));
  };

  const loadDashboard = async (month) => {
    const [ordRes, custRes, ctRes, txRes, prodRes] = await Promise.all([
      api.getOrders({ limit:200 }),
      api.getCustomers(),
      api.getContracts(),
      api.getTransactions({ limit:500 }),
      api.getProducts(),
    ]);
    const orders   = ordRes.success  ? (ordRes.data?.data  || ordRes.data  || []) : [];
    const customers= custRes.success ? (custRes.data?.data || custRes.data || []) : [];
    const contracts= ctRes.success   ? (ctRes.data?.data   || ctRes.data   || []) : [];
    const txsAll   = txRes.success   ? (txRes.data?.data   || txRes.data   || []) : [];
    const products = prodRes.success ? (prodRes.data?.data || prodRes.data || []) : [];

    const txs = month ? txsAll.filter(t=>(t.due_date||'').startsWith(month)) : txsAll;
    const ordM = month ? orders.filter(o=>((o.scheduled_date||o.created_at||'')).startsWith(month)) : orders;

    const openSt = ['OPEN','SCHEDULED','IN_TRANSIT','IN_PROGRESS'];
    const receivedRevenue = txs.filter(t=>t.type==='INCOME'&&t.status==='RECEIVED').reduce((s,t)=>s+(t.amount||0),0);
    const paidExpense     = txs.filter(t=>t.type==='EXPENSE'&&t.status==='PAID').reduce((s,t)=>s+(t.amount||0),0);
    const pendingRevenue  = txs.filter(t=>t.type==='INCOME'&&t.status==='PENDING').reduce((s,t)=>s+(t.amount||0),0);
    const pendingExpense  = txs.filter(t=>t.type==='EXPENSE'&&t.status==='PENDING').reduce((s,t)=>s+(t.amount||0),0);

    setStats({
      openOrders:       ordM.filter(o=>openSt.includes(o.status)).length,
      completedOrders:  ordM.filter(o=>o.status==='COMPLETED').length,
      invoicedOrders:   ordM.filter(o=>o.status==='INVOICED').length,
      activeContracts:  contracts.filter(c=>c.status==='ACTIVE').length,
      totalCustomers:   customers.length,
      lowStockItems:    products.filter(p=>(p.quantity||0)<=(p.min_stock||0)&&(p.min_stock||0)>0).length,
      receivedRevenue, paidExpense, pendingRevenue, pendingExpense,
    });
    setAllOrders(ordM);
    setChartData(buildWeeklyChart(txsAll, month));

    const now = new Date();
    const in30 = new Date(); in30.setDate(in30.getDate()+30);
    const newAlerts = [];
    orders.filter(o=>o.scheduled_date&&new Date(o.scheduled_date)<now&&openSt.includes(o.status)).slice(0,3).forEach(o=>{
      newAlerts.push({id:`os-${o.id}`,severity:'HIGH',title:'OS em atraso',message:`${o.number} — agendada ${new Date(o.scheduled_date).toLocaleDateString('pt-BR')}`,type:'OVERDUE_ORDER'});
    });
    contracts.filter(c=>c.status==='ACTIVE'&&c.end_date&&new Date(c.end_date)<=in30).slice(0,3).forEach(c=>{
      newAlerts.push({id:`ct-${c.id}`,severity:'MEDIUM',title:'Contrato expirando',message:`${c.number} expira em ${new Date(c.end_date).toLocaleDateString('pt-BR')}`,type:'CONTRACT_EXPIRING'});
    });
    products.filter(p=>(p.quantity||0)<=(p.min_stock||0)&&(p.min_stock||0)>0).slice(0,2).forEach(p=>{
      newAlerts.push({id:`inv-${p.id}`,severity:'MEDIUM',title:'Estoque crítico',message:`"${p.name}" — ${p.quantity||0} un. (mín: ${p.min_stock||0})`,type:'LOW_STOCK'});
    });
    txs.filter(t=>t.due_date&&new Date(t.due_date)<now&&t.status==='PENDING').slice(0,2).forEach(t=>{
      newAlerts.push({id:`tx-${t.id}`,severity:t.type==='INCOME'?'HIGH':'MEDIUM',title:t.type==='INCOME'?'Recebimento em atraso':'Pagamento em atraso',message:`${t.description||'—'} — venceu ${new Date(t.due_date).toLocaleDateString('pt-BR')}`,type:t.type==='INCOME'?'OVERDUE_RECEIVABLE':'OVERDUE_PAYABLE'});
    });
    setAlerts(newAlerts);
  };

  const openPipeline = step => {
    const statusMap = { open:'OPEN', scheduled:'SCHEDULED', progress:'IN_TRANSIT,IN_PROGRESS', completed:'COMPLETED', invoiced:'INVOICED' };
    const statuses = (statusMap[step]||'').split(',');
    const data = allOrders.filter(o=>statuses.includes(o.status)).map(o=>({
      number: o.number, customer: o.customers?.name||'—', type: o.type||'—',
      tech: o.technicians?.name||'Não atribuído', date: o.scheduled_date||o.created_at?.split('T')[0]||'—',
    }));
    const titles = { open:'OS Abertas', scheduled:'OS Agendadas', progress:'OS em Andamento', completed:'OS Concluídas', invoiced:'OS Faturadas' };
    setPipelineModal({ title: titles[step]||step, data, cols:['Nº OS','Cliente','Tipo','Técnico','Data'], row:r=>[r.number,r.customer,r.type,r.tech,r.date] });
  };

  const RevExpChart = ({ data }) => {
    const maxVal = Math.max(...data.flatMap(d=>[d.a,d.b]).filter(v=>v>0))||1;
    const barH=120;
    return (
      <div>
        <div className="flex items-end gap-3" style={{height:barH+40}}>
          {data.map((col,i)=>(
            <div key={i} className="flex-1 flex flex-col items-center gap-0.5">
              <div className="flex gap-0.5 w-full justify-center mb-1" style={{minHeight:28}}>
                {col.a>0&&<span className="text-xs text-blue-600 font-semibold" style={{fontSize:'10px'}}>{fmt(col.a).replace('R$\u00a0','').replace(',00','')}</span>}
              </div>
              <div className="flex items-end gap-0.5 w-full" style={{height:barH}}>
                <div className="flex-1 rounded-t-sm transition-all relative group" style={{height:col.a>0?`${(col.a/maxVal)*barH}px`:'2px',background:'#3b82f6',opacity:col.a>0?0.85:0.15}}>
                  <div className="absolute -top-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-xs px-1.5 py-0.5 rounded opacity-0 group-hover:opacity-100 whitespace-nowrap z-10">Receita: {fmt(col.a)}</div>
                </div>
                <div className="flex-1 rounded-t-sm transition-all relative group" style={{height:col.b>0?`${(col.b/maxVal)*barH}px`:'2px',background:'#f87171',opacity:col.b>0?0.85:0.15}}>
                  <div className="absolute -top-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-xs px-1.5 py-0.5 rounded opacity-0 group-hover:opacity-100 whitespace-nowrap z-10">Despesa: {fmt(col.b)}</div>
                </div>
              </div>
              <span className="text-xs text-gray-400 mt-1">{col.label}</span>
            </div>
          ))}
        </div>
        <div className="mt-3 pt-3 border-t border-gray-100 grid grid-cols-3 gap-2 text-center">
          <div><p className="text-xs text-gray-400">Total Receita</p><p className="text-sm font-bold text-blue-600">{fmt(data.reduce((s,c)=>s+c.a,0))}</p></div>
          <div><p className="text-xs text-gray-400">Total Despesa</p><p className="text-sm font-bold text-red-500">{fmt(data.reduce((s,c)=>s+c.b,0))}</p></div>
          <div><p className="text-xs text-gray-400">Lucro</p><p className="text-sm font-bold text-green-600">{fmt(data.reduce((s,c)=>s+(c.a-c.b),0))}</p></div>
        </div>
      </div>
    );
  };

  const prevMonthNav = () => {
    const [y,m] = dashMonth.split('-').map(Number);
    setDashMonth(m===1?`${y-1}-12`:`${y}-${String(m-1).padStart(2,'0')}`);
  };
  const nextMonthNav = () => {
    const [y,m] = dashMonth.split('-').map(Number);
    const now = new Date();
    const cur = `${y}-${String(m).padStart(2,'0')}`;
    const nowM = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    if (cur >= nowM) return;
    setDashMonth(m===12?`${y+1}-01`:`${y}-${String(m+1).padStart(2,'0')}`);
  };
  const dashMonthLabel = (()=>{
    const [y,m] = dashMonth.split('-').map(Number);
    return `${MONTH_NAMES[m-1]} ${y}`;
  })();

  return (
    <div className="p-6 space-y-5">
      {/* Header com seletor de mês */}
      <div className="flex items-center justify-between flex-wrap gap-3">
        <div className="flex items-center gap-3">
          <div className="flex items-center gap-1 bg-white border border-gray-200 rounded-xl shadow-sm px-2 py-1">
            <button onClick={prevMonthNav} className="p-1 rounded-lg text-gray-400 hover:text-gray-700 hover:bg-gray-100">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
            </button>
            <input type="month" value={dashMonth} onChange={e=>setDashMonth(e.target.value)}
              className="text-sm font-semibold text-gray-700 border-none outline-none bg-transparent cursor-pointer px-1"/>
            <button onClick={nextMonthNav} className="p-1 rounded-lg text-gray-400 hover:text-gray-700 hover:bg-gray-100">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>
            </button>
          </div>
          <span className="text-sm font-semibold text-gray-600">{dashMonthLabel}</span>
          {(()=>{ const tr=TAX_REGIMES[taxRegime]; return (
            <div className={`flex items-center gap-1.5 text-xs font-semibold px-2.5 py-1 rounded-full ${tr.color}`}>
              <span className={`w-1.5 h-1.5 rounded-full ${tr.dot}`}/>
              {tr.label}
            </div>
          ); })()}
        </div>
        <button onClick={()=>setDashMonth(new Date().toISOString().slice(0,7))} className="text-xs text-blue-600 hover:underline font-medium">Mês atual</button>
      </div>

      <div className="grid grid-cols-2 xl:grid-cols-3 gap-4">
        <KPI title="Receita Recebida"  value={fmt(stats.receivedRevenue)} sub={`+ ${fmt(stats.pendingRevenue)} pendente`} icon="financial" color="green"/>
        <KPI title="Despesas Pagas"    value={fmt(stats.paidExpense)}     sub={`+ ${fmt(stats.pendingExpense)} pendente`} icon="financial" color="red"/>
        <KPI title="Resultado"         value={fmt(stats.receivedRevenue - stats.paidExpense)} sub={stats.receivedRevenue>0?`Margem: ${((1-(stats.paidExpense/stats.receivedRevenue))*100).toFixed(1)}%`:'—'} icon="financial" color="blue"/>
      </div>

      <div className="grid grid-cols-2 xl:grid-cols-3 gap-4">
        <KPI title="OS Abertas"       value={String(stats.openOrders)}   sub={`${stats.invoicedOrders} faturadas`} icon="orders" color="orange"/>
        <KPI title="OS Concluídas"    value={String(stats.completedOrders)} sub={`${stats.activeContracts} contratos ativos`} icon="orders" color="green"/>
        <KPI title="Clientes Ativos"  value={String(stats.totalCustomers)} sub={stats.lowStockItems>0?`${stats.lowStockItems} itens em falta no estoque`:'estoque OK'} icon="customers" color={stats.lowStockItems>0?'red':'blue'}/>
      </div>

      {/* Pipeline */}
      <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
        <div className="px-5 py-3.5 border-b border-gray-100 flex items-center justify-between">
          <div><h3 className="text-sm font-semibold text-gray-800">Pipeline de Faturamento — OS</h3><p className="text-xs text-gray-400 mt-0.5">Clique em qualquer etapa para ver as ordens</p></div>
          <div className="flex items-center gap-2">
            <span className="text-xs text-gray-400">De:</span>
            <input type="date" value={pipelineFrom} onChange={e=>setPipelineFrom(e.target.value)} className="text-xs border border-gray-200 rounded-lg px-2 py-1 focus:outline-none"/>
            <span className="text-xs text-gray-400">Até:</span>
            <input type="date" value={pipelineTo} onChange={e=>setPipelineTo(e.target.value)} className="text-xs border border-gray-200 rounded-lg px-2 py-1 focus:outline-none"/>
            {(pipelineFrom||pipelineTo)&&<button onClick={()=>{setPipelineFrom('');setPipelineTo('');}} className="text-xs text-gray-400 hover:text-red-500 font-bold">✕</button>}
          </div>
        </div>
        {(()=>{
          const stages = [
            { key:'open',      label:'Abertas',       count:allOrders.filter(o=>o.status==='OPEN').length,                                        icon:'📋', color:'text-gray-600',   bg:'bg-gray-100',  bar:'bg-gray-400',   sub:'aguardando atribuição' },
            { key:'scheduled', label:'Agendadas',     count:allOrders.filter(o=>o.status==='SCHEDULED').length,                                    icon:'📅', color:'text-blue-600',   bg:'bg-blue-50',   bar:'bg-blue-400',   sub:'técnico designado' },
            { key:'progress',  label:'Em Andamento',  count:allOrders.filter(o=>['IN_TRANSIT','IN_PROGRESS'].includes(o.status)).length,           icon:'🔧', color:'text-orange-600', bg:'bg-orange-50', bar:'bg-orange-400', sub:'em campo / execução' },
            { key:'completed', label:'Concluídas',    count:allOrders.filter(o=>o.status==='COMPLETED').length,                                    icon:'✅', color:'text-green-600',  bg:'bg-green-50',  bar:'bg-green-500',  sub:'aguardando faturamento' },
            { key:'invoiced',  label:'Faturadas',     count:allOrders.filter(o=>o.status==='INVOICED').length,                                     icon:'🧾', color:'text-purple-600', bg:'bg-purple-50', bar:'bg-purple-400', sub:'nota fiscal emitida' },
          ];
          const total = allOrders.length || 1;
          return (
            <div className="grid grid-cols-5 divide-x divide-gray-100">
              {stages.map((s,i)=>{
                const pct = Math.round((s.count/total)*100);
                return (
                  <button key={i} onClick={()=>openPipeline(s.key)} className="p-5 text-left hover:bg-gray-50 transition-colors group">
                    <div className="flex items-start justify-between mb-3">
                      <div className={`${s.bg} ${s.color} w-9 h-9 rounded-lg flex items-center justify-center text-base`}>{s.icon}</div>
                      {i<4&&<span className="text-gray-200 text-xl mt-0.5">›</span>}
                    </div>
                    <p className="text-2xl font-bold text-gray-900">{s.count}</p>
                    <p className="text-xs font-semibold text-gray-600 mt-0.5">{s.label}</p>
                    <p className="text-xs text-gray-400 mt-0.5">{s.sub}</p>
                    <div className="mt-3 w-full bg-gray-100 rounded-full h-1.5"><div className={`h-1.5 rounded-full ${s.bar}`} style={{width:`${pct}%`}}/></div>
                    <p className="text-xs text-gray-400 mt-1 group-hover:text-blue-500">{pct}% do total →</p>
                  </button>
                );
              })}
            </div>
          );
        })()}
      </div>

      <Modal open={!!pipelineModal} onClose={()=>setPipelineModal(null)} title={pipelineModal?.title||''} size="xl">
        {pipelineModal&&(
          <div>
            <div className="flex items-center justify-between mb-4">
              <p className="text-sm text-gray-500">{pipelineModal.data.length} ordens de serviço</p>
              {pipelineModal.data.length===0&&<p className="text-sm text-gray-400 italic">Nenhuma OS nesta etapa</p>}
            </div>
            <table className="w-full text-sm">
              <thead className="bg-gray-50"><tr>{pipelineModal.cols.map(c=><th key={c} className="px-4 py-2.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">{c}</th>)}</tr></thead>
              <tbody className="divide-y divide-gray-100">
                {pipelineModal.data.map((r,i)=>(
                  <tr key={i} className="hover:bg-gray-50">
                    {pipelineModal.row(r).map((cell,j)=>(
                      <td key={j} className={`px-4 py-3 ${j===0?'font-mono text-xs font-semibold text-gray-700':j===pipelineModal.cols.length-1?'font-semibold text-gray-800 text-right':'text-gray-600'}`}>{cell}</td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
            <div className="mt-4 flex gap-2">
              <button onClick={()=>{setPipelineModal(null);setPage('orders');}} className="flex-1 py-2.5 border border-blue-600 text-blue-600 rounded-lg text-sm font-medium hover:bg-blue-50">Ver todas as OS →</button>
              <button onClick={()=>{setPipelineModal(null);setPage('financial');}} className="flex-1 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">Ir para Financeiro →</button>
            </div>
          </div>
        )}
      </Modal>

      <div className="grid grid-cols-1 xl:grid-cols-3 gap-5">
        <div className="bg-white rounded-xl border border-gray-200 p-5 shadow-sm">
          <div className="flex items-start justify-between mb-4">
            <div><h3 className="text-sm font-semibold text-gray-800">Receita vs Despesa</h3><p className="text-xs text-gray-400">{dashMonthLabel} — por semana</p></div>
            <div className="flex items-center gap-3 text-xs text-gray-500">
              <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-blue-500 inline-block"/>Receita</span>
              <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-red-400 inline-block"/>Despesa</span>
            </div>
          </div>
          <RevExpChart data={chartData.length>0?chartData:d.chart}/>
        </div>
        <div className="bg-white rounded-xl border border-gray-200 p-5 shadow-sm flex flex-col items-center">
          <div className="flex items-start justify-between w-full mb-2">
            <div><h3 className="text-sm font-semibold text-gray-800">Health Score</h3><p className="text-xs text-gray-400">Saúde financeira geral</p></div>
          </div>
          <Gauge score={72}/>
          <div className="grid grid-cols-2 gap-x-4 gap-y-1.5 w-full mt-1">
            {[['Liquidez','80'],['Inadimplência','75'],['Margem','65'],['Tendência','70']].map(([l,s])=>(
              <div key={l}>
                <div className="flex justify-between text-xs text-gray-500 mb-0.5"><span>{l}</span><span className="font-medium">{s}</span></div>
                <div className="w-full h-1.5 bg-gray-100 rounded-full"><div className="h-1.5 bg-blue-500 rounded-full" style={{width:`${s}%`}}/></div>
              </div>
            ))}
          </div>
        </div>
        <div className="bg-white rounded-xl border border-gray-200 p-5 shadow-sm">
          <div className="mb-3 flex items-start justify-between">
            <div><h3 className="text-sm font-semibold text-gray-800">Evolução do Caixa</h3><p className="text-xs text-gray-400">{d.label}</p></div>
            <div className={`text-xs font-bold px-2 py-0.5 rounded-full ${d.cfEnd>=d.cfStart?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}`}>
              {d.cfEnd>=d.cfStart?'▲':'▼'} {Math.abs(((d.cfEnd-d.cfStart)/d.cfStart)*100).toFixed(1)}%
            </div>
          </div>
          <LineChart data={d.cashFlow} color="#10b981" height={130}/>
          <div className="flex justify-between mt-1 mb-3 text-xs text-gray-400">{d.cfLabels.map(l=><span key={l}>{l}</span>)}</div>
          <div className="border-t border-gray-100 pt-3 space-y-1">
            {[
              {l:'Saldo Inicial', v:d.cfStart, cls:'text-gray-700'},
              {l:'Saldo Final',   v:d.cfEnd,   cls:d.cfEnd>=d.cfStart?'text-green-600':'text-red-600'},
              {l:'Variação',      v:d.cfEnd-d.cfStart, cls:d.cfEnd>=d.cfStart?'text-green-600':'text-red-600', showSign:true},
              {l:'Mínimo',        v:Math.min(...d.cashFlow.filter(c=>c.v>0).map(c=>c.v)), cls:'text-gray-500'},
              {l:'Máximo',        v:Math.max(...d.cashFlow.map(c=>c.v)), cls:'text-gray-500'},
            ].map(({l,v,cls,showSign})=>(
              <div key={l} className="flex justify-between text-xs">
                <span className="text-gray-400">{l}</span>
                <span className={`font-semibold ${cls}`}>{showSign&&v>0?'+':''}{fmt(v)}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
        <div className="px-5 py-3.5 border-b border-gray-100 flex items-center justify-between">
          <h3 className="text-sm font-semibold text-gray-800">Alertas Ativos</h3>
          {alerts.length>0
            ? <span className="bg-red-100 text-red-700 text-xs font-bold px-2 py-0.5 rounded-full">{alerts.length}</span>
            : <span className="bg-green-100 text-green-700 text-xs font-bold px-2 py-0.5 rounded-full">0</span>}
        </div>
        {alerts.length===0
          ? <p className="px-5 py-6 text-sm text-gray-400 text-center">Nenhum alerta pendente</p>
          : alerts.map(a=>{
              const sev={HIGH:['border-l-red-500','bg-red-50','🔴'],MEDIUM:['border-l-amber-400','bg-amber-50','🟡'],LOW:['border-l-blue-400','bg-blue-50','🔵']}[a.severity]||['border-l-gray-300','bg-gray-50','⚪'];
              const navMap2={OVERDUE_RECEIVABLE:'financial',OVERDUE_PAYABLE:'financial',LOW_STOCK:'inventory',OVERDUE_ORDER:'orders',CONTRACT_EXPIRING:'contracts'};
              return (
                <div key={a.id} className={`flex items-start gap-3 px-5 py-3 border-l-4 ${sev[0]} ${sev[1]} border-b border-gray-50 last:border-b-0`}>
                  <span className="text-sm mt-0.5">{sev[2]}</span>
                  <div className="flex-1"><p className="text-sm font-medium text-gray-800">{a.title}</p><p className="text-xs text-gray-500 mt-0.5">{a.message}</p></div>
                  <button onClick={()=>setPage(navMap2[a.type]||'dashboard')} className="text-xs text-blue-600 hover:underline shrink-0 font-medium whitespace-nowrap">Ver →</button>
                </div>
              );
            })
        }
      </div>
      {/* Card Regime Tributário */}
      {(()=>{ const tr=TAX_REGIMES[taxRegime]; return (
        <div className={`rounded-xl border p-4 flex items-center gap-5 flex-wrap ${tr.color.replace('text-','border-').replace('100','200')} bg-white`}>
          <div className="flex items-center gap-2">
            <span className={`w-3 h-3 rounded-full ${tr.dot}`}/>
            <div>
              <p className="text-xs text-gray-400">Regime Tributário Ativo</p>
              <p className="text-sm font-bold text-gray-800">{tr.label}</p>
            </div>
          </div>
          <div className="h-8 w-px bg-gray-200"/>
          <div className="text-xs text-gray-500 space-y-0.5">
            <p>{tr.method}</p>
            <span className={`inline-block px-2 py-0.5 rounded text-xs font-medium ${tr.obColor}`}>{tr.obligation}</span>
          </div>
          <div className="ml-auto flex items-center gap-4 text-xs">
            {tr.iss   &&<div className="text-center"><p className="text-gray-400">ISS</p><p className="font-bold text-gray-700">{(tr.iss*100).toFixed(0)}%</p></div>}
            {tr.pis   &&<div className="text-center"><p className="text-gray-400">PIS</p><p className="font-bold text-gray-700">{(tr.pis*100).toFixed(2)}%</p></div>}
            {tr.cofins&&<div className="text-center"><p className="text-gray-400">COFINS</p><p className="font-bold text-gray-700">{(tr.cofins*100).toFixed(2)}%</p></div>}
            {tr.dasRate&&<div className="text-center"><p className="text-gray-400">DAS</p><p className="font-bold text-gray-700">{(tr.dasRate*100).toFixed(1)}%</p></div>}
            {tr.irpjRate&&<div className="text-center"><p className="text-gray-400">IRPJ</p><p className="font-bold text-gray-700">{(tr.irpjRate*100).toFixed(0)}%+</p></div>}
            {tr.csllRate&&<div className="text-center"><p className="text-gray-400">CSLL</p><p className="font-bold text-gray-700">{(tr.csllRate*100).toFixed(0)}%</p></div>}
          </div>
        </div>
      ); })()}
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
};

// ─── ORDERS ───────────────────────────────────────────────────────────────────

const STATUS_FLOW = {
  OPEN:        { next:'SCHEDULED',  label:'Agendar OS',         color:'blue'   },
  SCHEDULED:   { next:'IN_TRANSIT', label:'Despachar Técnico',  color:'sky'    },
  IN_TRANSIT:  { next:'IN_PROGRESS',label:'Iniciar Atendimento',color:'orange' },
  IN_PROGRESS: { next:'COMPLETED',  label:'Concluir OS',        color:'green'  },
  COMPLETED:   { next:'INVOICED',   label:'Faturar OS',         color:'purple' },
};

const COLS = [
  { key:'OPEN',        label:'Abertas',      bg:'bg-gray-100',   text:'text-gray-700'   },
  { key:'SCHEDULED',   label:'Agendadas',    bg:'bg-blue-100',   text:'text-blue-700'   },
  { key:'IN_TRANSIT',  label:'Em Trânsito',  bg:'bg-sky-100',    text:'text-sky-700'    },
  { key:'IN_PROGRESS', label:'Em Andamento', bg:'bg-orange-100', text:'text-orange-700' },
  { key:'COMPLETED',   label:'Concluídas',   bg:'bg-green-100',  text:'text-green-700'  },
  { key:'INVOICED',    label:'Faturadas',    bg:'bg-purple-100', text:'text-purple-700' },
];

const OrdersPage = ({ taxRegime='REAL' }) => {
  const [view, setView]         = useState('kanban');
  const [q, setQ]               = useState('');
  const [orders, setOrders]     = useState([]);
  const [loading, setLoading]   = useState(true);
  const [selected, setSelected] = useState(null);
  const [newModal, setNewModal] = useState(false);
  const [toast, setToast]       = useState(null);
  const [technicians, setTechnicians] = useState([]);
  const [customers, setCustomers] = useState([]);

  useEffect(() => {
    loadOrders();
    api.getTechnicians().then(r => { if (r.success) setTechnicians(r.data?.data || r.data || []); });
    api.getCustomers().then(r => { if (r.success) setCustomers(r.data?.data || r.data || []); });
  }, []);

  const loadOrders = async () => {
    setLoading(true);
    const result = await api.getOrders();
    if (result.success) {
      setOrders(result.data?.data || result.data || []);
    } else {
      setOrders([]);
    }
    setLoading(false);
  };
  const [newOS, setNewOS]       = useState({ customer_id:'', type:'Instalação', priority:'MEDIUM', description:'', scheduled_date:'', assigned_technician_id:'', substation:'', city:'' });
  const [nfModal, setNfModal]   = useState(false);
  const [nfData, setNfData]     = useState({ number:'', series:'1', date:'', value:'' });
  const [pendingInvoice, setPendingInvoice] = useState(null);

  const advance = async (id, nf) => {
    const o = orders.find(o=>o.id===id);
    const flow = STATUS_FLOW[o?.status];
    if (!flow) return;
    const result = await api.updateOrder(id, { status: flow.next });
    if (result.success) {
      setOrders(prev=>prev.map(x=>x.id===id?{...x, status:flow.next, ...(nf?{nf}:{})}:x));
      setSelected(prev=>prev?{...prev, status:flow.next, ...(nf?{nf}:{})}:null);
      setToast(`OS ${o.number}: ${flow.label} concluído!`);
    } else {
      setToast(`Erro ao avançar OS: ${result.error}`);
    }
  };

  const requestInvoice = id => {
    const today = new Date().toISOString().split('T')[0];
    setNfData({ number:'', series:'1', date:today, value:'' });
    setPendingInvoice(id);
    setNfModal(true);
  };

  const confirmInvoice = () => {
    if (!nfData.number.trim()) return;
    advance(pendingInvoice, nfData);
    setNfModal(false);
    setPendingInvoice(null);
    setToast(`NF ${nfData.number} vinculada com sucesso!`);
  };

  const cancel = async id => {
    const o = orders.find(o=>o.id===id);
    const result = await api.updateOrder(id, { status: 'CANCELLED' });
    if (result.success) {
      setOrders(prev=>prev.map(x=>x.id===id?{...x,status:'CANCELLED'}:x));
      setToast(`OS ${o?.number} cancelada.`);
      setSelected(null);
    } else {
      setToast(`Erro ao cancelar OS: ${result.error}`);
    }
  };

  const assignTech = async (id, assigned_technician_id) => {
    const result = await api.updateOrder(id, { assigned_technician_id: assigned_technician_id || null });
    if (result.success) {
      setOrders(prev=>prev.map(x=>x.id===id?result.data:x));
      setSelected(prev=>prev?result.data:null);
    }
  };

  const createOS = async () => {
    if (!newOS.customer_id) { setToast('Selecione um cliente'); return; }
    if (!newOS.scheduled_date) { setToast('Data agendada é obrigatória'); return; }
    const result = await api.createOrder({
      customer_id: newOS.customer_id,
      type: newOS.type,
      priority: newOS.priority,
      status: 'OPEN',
      scheduled_date: newOS.scheduled_date,
      assigned_technician_id: newOS.assigned_technician_id || null,
      description: newOS.description || null,
      substation: newOS.substation || null,
      city: newOS.city || null,
    });
    if (result.success) {
      setOrders(prev=>[result.data,...prev]);
      setNewModal(false);
      setNewOS({ customer_id:'', type:'Instalação', priority:'MEDIUM', description:'', scheduled_date:'', assigned_technician_id:'', substation:'', city:'' });
      setToast(`OS ${result.data.number} criada com sucesso!`);
    } else {
      setToast(`Erro ao criar OS: ${result.error}`);
    }
  };

  const filtered = orders.filter(o=>!q||o.number.toLowerCase().includes(q.toLowerCase())||(o.customers?.name||o.customer||'').toLowerCase().includes(q.toLowerCase()));
  const byStatus = Object.fromEntries(COLS.map(c=>[c.key, filtered.filter(o=>o.status===c.key)]));

  const OSCard = ({ o }) => (
    <div onClick={()=>setSelected(o)} className={`bg-white rounded-lg p-3 shadow-sm border-l-4 ${PRIORITY_BORDER[o.priority]} cursor-pointer hover:shadow-md transition-shadow`}>
      <div className="flex items-center justify-between gap-1 mb-1">
        <span className="text-xs font-mono font-bold text-gray-600">{o.number}</span>
        <PriorityBadge p={o.priority}/>
      </div>
      <p className="text-sm font-medium text-gray-800 truncate">{o.customers?.name||o.customer}</p>
      <p className="text-xs text-gray-500">{o.type}</p>
      <div className="flex items-center gap-3 mt-2 text-xs text-gray-400">
        <span className="flex items-center gap-1"><Icon name="calendar" className="w-3 h-3"/>{fmtDate(o.scheduled_date||o.date)}</span>
        {(o.technicians?.name||o.tech)&&<span className="flex items-center gap-1 truncate"><Icon name="user" className="w-3 h-3"/>{(o.technicians?.name||o.tech||'').split(' ')[0]}</span>}
      </div>
      {o.nf&&<div className="mt-1.5 text-xs font-mono font-semibold text-purple-600 bg-purple-50 px-2 py-0.5 rounded">🧾 NF {o.nf.number}</div>}
    </div>
  );

  // Derive current selected from orders state so status stays in sync
  const selOS = selected ? orders.find(o=>o.id===selected.id)||selected : null;
  const flow = selOS ? STATUS_FLOW[selOS.status] : null;
  const btnColors = { blue:'bg-blue-600 hover:bg-blue-700', sky:'bg-sky-600 hover:bg-sky-700', orange:'bg-orange-600 hover:bg-orange-700', green:'bg-green-600 hover:bg-green-700', purple:'bg-purple-600 hover:bg-purple-700' };

  return (
    <div className="flex flex-col h-full overflow-hidden">
      <div className="bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-3 shrink-0">
        <div className="relative">
          <Icon name="search" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"/>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar OS ou cliente..." className="pl-9 pr-4 py-2 text-sm border border-gray-200 rounded-lg w-64 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
        </div>
        <div className="flex bg-gray-100 rounded-lg p-0.5">
          <button onClick={()=>setView('kanban')} className={`px-3 py-1.5 rounded text-sm font-medium ${view==='kanban'?'bg-white shadow text-gray-800':'text-gray-500'}`}>Kanban</button>

          <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 border-b border-gray-200">
                <tr>{['Nº','Cliente','Cidade','Subestação','Tipo','Prioridade','Status','Nota Fiscal','Agendado','Técnico',''].map(h=>(

              </thead>
              <tbody className="divide-y divide-gray-100">
                {filtered.map(o=>(
                  <tr key={o.id} className="hover:bg-gray-50 cursor-pointer" onClick={()=>setSelected(o)}>

                    <td className="px-4 py-3 text-gray-800">{o.customers?.name||o.customer}</td>
                    <td className="px-4 py-3 text-xs text-gray-500">{o.city||'—'}</td>
                    <td className="px-4 py-3 text-xs text-gray-500 max-w-xs truncate">{o.substation||'—'}</td>
                    <td className="px-4 py-3 text-gray-600">{o.type}</td>
                    <td className="px-4 py-3"><PriorityBadge p={o.priority}/></td>
                    <td className="px-4 py-3"><Badge status={o.status}/></td>
                    <td className="px-4 py-3">
                      {o.nf
                        ? <span className="font-mono text-xs font-semibold text-purple-700 bg-purple-50 px-2 py-0.5 rounded">NF {o.nf.number}</span>
                        : <span className="text-gray-300 text-xs">—</span>}
                    </td>
                    <td className="px-4 py-3 text-gray-600">{fmtDate(o.scheduled_date||o.date)}</td>
                    <td className="px-4 py-3 text-gray-600">{o.technicians?.name||o.tech||<span className="text-gray-300">—</span>}</td>
                    <td className="px-4 py-3"><button className="text-xs text-blue-600 hover:underline font-medium">Abrir →</button></td>

                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* OS Detail Modal */}
      <Modal open={!!selOS} onClose={()=>setSelected(null)} title={selOS?.number||''} size="lg">
        {selOS&&(
          <div className="space-y-5">
            <div className="flex items-center gap-2 flex-wrap">
              <Badge status={selOS.status}/><PriorityBadge p={selOS.priority}/>
              <span className="text-sm text-gray-500">{selOS.type}</span>
            </div>
            <div className="grid grid-cols-2 gap-4">
              <div className="space-y-3">
                <LabelField label="Cliente"      value={selOS.customers?.name||selOS.customer||'—'}/>
                <LabelField label="Data"         value={fmtDate(selOS.scheduled_date||selOS.date)}/>
                <LabelField label="Cidade"       value={selOS.city||'—'}/>
                <LabelField label="Subestação"   value={selOS.substation||'—'}/>
                <LabelField label="Descrição"    value={selOS.description||selOS.desc||'—'}/>
                {/* Painel fiscal */}
                {(()=>{
                  const tr = TAX_REGIMES[taxRegime];
                  return (
                    <div className="bg-gray-50 rounded-xl p-3 border border-gray-100">
                      <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Tributação Aplicável</p>
                      <div className="flex items-center gap-2 mb-2">
                        <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${tr.color}`}>{tr.label}</span>
                      </div>
                      <div className="space-y-1 text-xs text-gray-600">
                        {tr.iss  && <p>ISS: <span className="font-semibold">{(tr.iss*100).toFixed(0)}%</span> sobre valor da OS</p>}
                        {tr.pis  && <p>PIS: <span className="font-semibold">{(tr.pis*100).toFixed(2)}%</span></p>}
                        {tr.cofins&&<p>COFINS: <span className="font-semibold">{(tr.cofins*100).toFixed(2)}%</span></p>}

                    </div>

              </div>
              <div className="space-y-3">
                <div>
                  <p className="text-xs text-gray-400 mb-1">Técnico Responsável</p>

                    <option value="">Nenhum (não atribuído)</option>
                    {technicians.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}

                </div>
                <div className="bg-gray-50 rounded-xl p-4">
                  <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Progresso</p>
                  <div className="space-y-2">
                    {['OPEN','SCHEDULED','IN_TRANSIT','IN_PROGRESS','COMPLETED','INVOICED'].map(s=>{
                      const sMap={OPEN:'Aberta',SCHEDULED:'Agendada',IN_TRANSIT:'Em Trânsito',IN_PROGRESS:'Em Andamento',COMPLETED:'Concluída',INVOICED:'Faturada'};
                      const steps=['OPEN','SCHEDULED','IN_TRANSIT','IN_PROGRESS','COMPLETED','INVOICED'];
                      const currentIdx=steps.indexOf(selOS.status);
                      const thisIdx=steps.indexOf(s);
                      const done=thisIdx<currentIdx, current=s===selOS.status;
                      return (
                        <div key={s} className={`flex items-center gap-2 text-xs ${current?'text-blue-700 font-semibold':done?'text-green-600':'text-gray-400'}`}>
                          <span className={`w-4 h-4 rounded-full flex items-center justify-center text-xs ${current?'bg-blue-600 text-white':done?'bg-green-500 text-white':'bg-gray-200'}`}>
                            {done?'✓':thisIdx+1}
                          </span>
                          {sMap[s]}
                          {current&&<span className="text-blue-500">← atual</span>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
            <div className="flex gap-2 pt-2 border-t border-gray-100">
              {selOS.status==='CANCELLED'||selOS.status==='INVOICED' ? (
                <div className="flex-1">
                  {selOS.status==='INVOICED'&&selOS.nf ? (
                    <div className="bg-purple-50 border border-purple-200 rounded-xl px-4 py-3 flex items-center gap-4 flex-wrap">
                      <div className="flex items-center gap-2">
                        <span className="text-purple-600 text-lg">🧾</span>
                        <div>
                          <p className="text-xs text-purple-400 font-medium uppercase tracking-wide">Nota Fiscal Emitida</p>
                          <p className="text-sm font-bold text-purple-800">NF {selOS.nf.number} · Série {selOS.nf.series}</p>
                        </div>
                      </div>
                      {selOS.nf.date&&<p className="text-xs text-purple-600">Emissão: {fmtDate(selOS.nf.date)}</p>}
                      {selOS.nf.value&&<p className="text-xs font-semibold text-purple-700">Valor: {fmt(Math.round(parseFloat(selOS.nf.value)*100))}</p>}
                    </div>
                  ) : (
                    <p className="text-sm text-center text-gray-400 py-2">{selOS.status==='INVOICED'?'OS finalizada e faturada.':'OS cancelada.'}</p>
                  )}
                </div>
              ) : (
                <>
                  {flow&&(
                    <button
                      onClick={()=>selOS.status==='COMPLETED' ? requestInvoice(selOS.id) : advance(selOS.id)}
                      className={`flex-1 py-2.5 text-white rounded-lg text-sm font-semibold ${btnColors[flow.color]||'bg-blue-600 hover:bg-blue-700'}`}>
                      {flow.label} →
                    </button>
                  )}
                  <button onClick={()=>cancel(selOS.id)} className="px-4 py-2.5 border border-red-200 text-red-600 rounded-lg text-sm hover:bg-red-50">Cancelar OS</button>
                </>
              )}
              <button onClick={()=>setSelected(null)} className="px-4 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-600 hover:bg-gray-50">Fechar</button>
            </div>
          </div>
        )}
      </Modal>

      {/* Nova OS Modal */}
      <Modal open={newModal} onClose={()=>setNewModal(false)} title="Nova Ordem de Serviço" size="md">
        <div className="space-y-4">
          <div><label className="block text-sm font-medium text-gray-700 mb-1">Cliente *</label>
            <select value={newOS.customer_id} onChange={e=>setNewOS(p=>({...p,customer_id:e.target.value}))} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="">Selecione o cliente...</option>
              {customers.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select></div>
          {[
            {label:'Cidade',             key:'city',        type:'text', placeholder:'Ex: São José do Rio Preto'},
            {label:'Subestação / Local', key:'substation',  type:'text', placeholder:'Ex: SE Cliente — Sala de Energia'},
            {label:'Descrição',          key:'description', type:'text', placeholder:'Descreva o serviço...'},
            {label:'Data Agendada *',    key:'scheduled_date', type:'date', placeholder:''},
          ].map(f=>(
            <div key={f.key}><label className="block text-sm font-medium text-gray-700 mb-1">{f.label}</label>
              <input type={f.type} value={newOS[f.key]} onChange={e=>setNewOS(p=>({...p,[f.key]:e.target.value}))} placeholder={f.placeholder}
                className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/></div>
          ))}
          <div><label className="block text-sm font-medium text-gray-700 mb-1">Técnico</label>
            <select value={newOS.assigned_technician_id} onChange={e=>setNewOS(p=>({...p,assigned_technician_id:e.target.value}))} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none">
              <option value="">Nenhum (não atribuído)</option>
              {technicians.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
            </select></div>
          <div className="grid grid-cols-2 gap-3">
            <div><label className="block text-sm font-medium text-gray-700 mb-1">Tipo</label>
              <select value={newOS.type} onChange={e=>setNewOS(p=>({...p,type:e.target.value}))} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none">
                {['Instalação','Manutenção','Revisão','Emergência'].map(t=><option key={t}>{t}</option>)}
              </select></div>
            <div><label className="block text-sm font-medium text-gray-700 mb-1">Prioridade</label>
              <select value={newOS.priority} onChange={e=>setNewOS(p=>({...p,priority:e.target.value}))} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none">
                <option value="LOW">Baixa</option><option value="MEDIUM">Média</option><option value="HIGH">Alta</option><option value="URGENT">Urgente</option>
              </select></div>
          </div>
          <div className="flex gap-2 pt-2">
            <button onClick={()=>setNewModal(false)} className="flex-1 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-600 hover:bg-gray-50">Cancelar</button>
            <button onClick={createOS} className="flex-1 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">Criar OS</button>
          </div>
        </div>
      </Modal>

      {/* Modal de Emissão de Nota Fiscal */}
      <Modal open={nfModal} onClose={()=>setNfModal(false)} title="Emitir Nota Fiscal" size="md">
        <div className="space-y-4">
          <div className="bg-purple-50 border border-purple-200 rounded-xl p-3 flex items-center gap-2">
            <span className="text-purple-500 text-lg">🧾</span>
            <p className="text-xs text-purple-700 font-medium">Informe os dados da NF antes de faturar a OS. O número ficará vinculado permanentemente ao registro.</p>
          </div>
          <div className="grid grid-cols-3 gap-3">
            <div className="col-span-2">
              <label className="block text-sm font-medium text-gray-700 mb-1">Número da NF *</label>
              <input value={nfData.number} onChange={e=>setNfData(p=>({...p,number:e.target.value}))} placeholder="Ex: 000123"
                className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500"/>
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">Série</label>
              <input value={nfData.series} onChange={e=>setNfData(p=>({...p,series:e.target.value}))} placeholder="1"
                className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500"/>
            </div>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">Data de Emissão</label>
              <input type="date" value={nfData.date} onChange={e=>setNfData(p=>({...p,date:e.target.value}))}
                className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500"/>
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">Valor da NF (R$)</label>
              <input type="number" value={nfData.value} onChange={e=>setNfData(p=>({...p,value:e.target.value}))} placeholder="0,00"
                className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500"/>
            </div>
          </div>
          <div className="flex gap-2 pt-2 border-t border-gray-100">
            <button onClick={()=>setNfModal(false)} className="flex-1 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-600 hover:bg-gray-50">Cancelar</button>
            <button onClick={confirmInvoice} disabled={!nfData.number.trim()}
              className={`flex-1 py-2.5 rounded-lg text-sm font-semibold text-white transition-colors ${nfData.number.trim()?'bg-purple-600 hover:bg-purple-700':'bg-gray-300 cursor-not-allowed'}`}>
              Faturar OS — NF {nfData.number||'—'}
            </button>
          </div>
        </div>
      </Modal>

      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
};

// ─── CUSTOMERS ────────────────────────────────────────────────────────────────

const CustomersPage = ({ setPage }) => {
  const [customers, setCustomers] = useState([]);
  const [loading, setLoading]     = useState(true);
  const [q, setQ]                 = useState('');
  const [typeF, setTypeF]         = useState('all');
  const [selected, setSelected]   = useState(null);
  const [newModal, setNewModal]   = useState(false);
  const [toast, setToast]         = useState(null);
  const [form, setForm]           = useState({ name:'', type:'PJ', doc:'', city:'', phone:'', email:'', active:true });

  // Carregar clientes da API
  useEffect(() => {
    loadCustomers();
  }, []);

  const loadCustomers = async () => {
    setLoading(true);
    const result = await api.getCustomers();
    if (result.success) {
      setCustomers(result.data?.data || result.data || []);
    } else {
      setCustomers([]);
    }
    setLoading(false);
  };

  const list = customers.filter(c=>
    (!q||c.name.toLowerCase().includes(q.toLowerCase())||c.doc.includes(q))&&
    (typeF==='all'||c.type===typeF)
  );

  const create = async () => {
    if (!form.name) { setToast('Nome é obrigatório'); return; }
    if (!form.doc) { setToast('CPF/CNPJ é obrigatório'); return; }

    const result = await api.createCustomer(form);
    if (result.success) {
      setCustomers(p=>[result.data, ...p]);
      setNewModal(false);
      setForm({name:'',type:'PJ',doc:'',city:'',phone:'',email:'',active:true});
      setToast(`Cliente ${form.name} cadastrado com sucesso!`);
    } else {
      setToast(`Erro ao criar cliente: ${result.error}`);
    }
  };

  const toggleActive = async (id) => {
    const customer = customers.find(c=>c.id===id);
    if (!customer) return;

    const result = await api.updateCustomer(id, { active: !customer.active });
    if (result.success) {
      setCustomers(p=>p.map(c=>c.id===id?result.data:c));
      setSelected(p=>p?.id===id?result.data:p);
    } else {
      setToast(`Erro ao atualizar cliente: ${result.error}`);
    }
  };

  const sel = selected ? customers.find(c=>c.id===selected.id)||selected : null;

  return (
    <div className="p-5 space-y-4">
      <div className="flex items-center gap-3">
        <div className="relative"><Icon name="search" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"/>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Nome ou documento..."
            className="pl-9 pr-4 py-2 text-sm border border-gray-200 rounded-lg w-72 focus:outline-none focus:ring-2 focus:ring-blue-500"/></div>
        <select value={typeF} onChange={e=>setTypeF(e.target.value)} className="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none">
          <option value="all">Todos</option><option value="PJ">Pessoa Jurídica</option><option value="PF">Pessoa Física</option>
        </select>
        <button onClick={()=>setNewModal(true)} className="ml-auto flex items-center gap-1.5 bg-blue-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-blue-700">
          <Icon name="plus" className="w-4 h-4"/> Novo Cliente
        </button>
      </div>
      <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
        <table className="w-full text-sm">
          <thead className="bg-gray-50 border-b border-gray-200">
            <tr>{['Tipo','Nome','Documento','Cidade','Contratos','OS Abertas','Faturamento','Status',''].map(h=>(
              <th key={h} className="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">{h}</th>
            ))}</tr>
          </thead>
          <tbody className="divide-y divide-gray-100">
            {list.map(c=>(
              <tr key={c.id} className="hover:bg-gray-50 cursor-pointer" onClick={()=>setSelected(c)}>
                <td className="px-4 py-3"><span className={`inline-flex items-center px-2 py-0.5 rounded text-xs font-bold ${c.type==='PJ'?'bg-indigo-50 text-indigo-600':'bg-teal-50 text-teal-600'}`}>{c.type}</span></td>
                <td className="px-4 py-3"><p className="font-medium text-gray-800">{c.name}</p><p className="text-xs text-gray-400">{c.email}</p></td>
                <td className="px-4 py-3 font-mono text-xs text-gray-500">{c.doc}</td>
                <td className="px-4 py-3 text-gray-600">{c.city||'—'}</td>
                <td className="px-4 py-3 text-center text-gray-700">{c.contracts}</td>
                <td className="px-4 py-3 text-center"><span className={`font-semibold ${c.openOS>0?'text-orange-600':'text-gray-400'}`}>{c.openOS}</span></td>
                <td className="px-4 py-3 font-medium text-gray-800">{fmt(c.revenue)}</td>
                <td className="px-4 py-3"><Badge status={c.active?'ACTIVE':'INACTIVE'}/></td>
                <td className="px-4 py-3"><button className="text-xs text-blue-600 hover:underline font-medium">Detalhes →</button></td>
              </tr>
            ))}
          </tbody>
        </table>
        <div className="px-4 py-2.5 bg-gray-50 border-t border-gray-100">
          <span className="text-xs text-gray-500">{list.length} clientes encontrados</span>
        </div>
      </div>

      {/* Customer Detail Modal */}
      <Modal open={!!sel} onClose={()=>setSelected(null)} title={sel?.name||''} size="lg">
        {sel&&(
          <div className="space-y-5">
            <div className="flex items-center gap-2">
              <span className={`inline-flex items-center px-2.5 py-0.5 rounded text-xs font-bold ${sel.type==='PJ'?'bg-indigo-50 text-indigo-600':'bg-teal-50 text-teal-600'}`}>{sel.type}</span>
              <Badge status={sel.active?'ACTIVE':'INACTIVE'}/>
            </div>
            <div className="grid grid-cols-2 gap-4">
              <div className="space-y-3">
                <LabelField label="Documento"  value={sel.doc}/>
                <LabelField label="Cidade"     value={sel.city}/>
                <div className="flex items-center gap-2"><Icon name="phone" className="w-4 h-4 text-gray-400"/><a href={`tel:${sel.phone}`} className="text-sm text-blue-600">{sel.phone||'—'}</a></div>
                <div className="flex items-center gap-2"><Icon name="mail"  className="w-4 h-4 text-gray-400"/><a href={`mailto:${sel.email}`} className="text-sm text-blue-600">{sel.email||'—'}</a></div>
              </div>
              <div className="space-y-3">
                <div className="bg-gray-50 rounded-xl p-4 grid grid-cols-3 gap-3 text-center">
                  <div><p className="text-xl font-bold text-gray-800">{sel.contracts}</p><p className="text-xs text-gray-400">Contratos</p></div>
                  <div><p className={`text-xl font-bold ${sel.openOS>0?'text-orange-600':'text-gray-800'}`}>{sel.openOS}</p><p className="text-xs text-gray-400">OS Abertas</p></div>
                  <div><p className="text-sm font-bold text-gray-800">{fmt(sel.revenue)}</p><p className="text-xs text-gray-400">Faturamento</p></div>
                </div>
              </div>
            </div>
            <div className="flex gap-2 pt-2 border-t border-gray-100">
              <button onClick={()=>{setSelected(null);setPage('orders');}} className="flex-1 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-semibold hover:bg-blue-700">Nova OS para este cliente</button>
              <button onClick={()=>{setSelected(null);setPage('contracts');}} className="flex-1 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-600 hover:bg-gray-50">Ver Contratos</button>
              <button onClick={()=>toggleActive(sel.id)} className={`px-4 py-2.5 border rounded-lg text-sm ${sel.active?'border-red-200 text-red-600 hover:bg-red-50':'border-green-200 text-green-600 hover:bg-green-50'}`}>
                {sel.active?'Inativar':'Ativar'}
              </button>
            </div>
          </div>
        )}
      </Modal>

      {/* Novo Cliente Modal */}
      <Modal open={newModal} onClose={()=>setNewModal(false)} title="Novo Cliente" size="md">
        <div className="space-y-4">
          <div className="flex gap-2">
            {[['PJ','Pessoa Jurídica'],['PF','Pessoa Física']].map(([v,l])=>(
              <button key={v} onClick={()=>setForm(p=>({...p,type:v}))} className={`flex-1 py-2 rounded-lg text-sm font-medium border transition-colors ${form.type===v?'bg-blue-600 text-white border-blue-600':'border-gray-200 text-gray-600 hover:bg-gray-50'}`}>{l}</button>
            ))}
          </div>
          {[
            {label:'Nome / Razão Social *', key:'name', placeholder:'Ex: Empresa XYZ Ltda'},
            {label:form.type==='PJ'?'CNPJ *':'CPF *', key:'doc', placeholder:form.type==='PJ'?'00.000.000/0001-00':'000.000.000-00'},
            {label:'Cidade', key:'city', placeholder:'Ex: São José do Rio Preto'},
            {label:'Telefone', key:'phone', placeholder:'(17) 99999-0000'},
            {label:'E-mail', key:'email', placeholder:'contato@empresa.com.br'},
          ].map(f=>(
            <div key={f.key}><label className="block text-sm font-medium text-gray-700 mb-1">{f.label}</label>
              <input value={form[f.key]} onChange={e=>setForm(p=>({...p,[f.key]:e.target.value}))} placeholder={f.placeholder}
                className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/></div>
          ))}
          <div className="flex gap-2 pt-2">
            <button onClick={()=>setNewModal(false)} className="flex-1 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-600 hover:bg-gray-50">Cancelar</button>
            <button onClick={create} className="flex-1 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">Cadastrar Cliente</button>
          </div>
        </div>
      </Modal>

      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
};
